function loginAsAdmin(username, password) {
  if (imsApiMode_()) {
    Swal.fire({ title: 'กำลังเข้าสู่ระบบ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
    imsApiFetch_('/login', { method: 'POST', body: { kind: 'super', username, password } }).then(async (r) => {
      if (!r || !r.success) {
        Swal.close();
        const errEl = document.getElementById('adminError');
        if (errEl) { errEl.textContent = '❌ ' + ((r && r.error) || 'เข้าสู่ระบบไม่สำเร็จ'); errEl.classList.remove('hidden'); }
        return;
      }
      imsApiSetToken_(r.token);
      STATE.role = 'admin';
      STATE.adminUser = r.username || username;
      STATE.adminRole = r.adminRole || 'super_admin';
      STATE.adminDepartmentId = null;
      STATE.currentPage = 'admin-dashboard';
      await imsApiSnapshot_();
      Swal.close();
      render();
    });
    return;
  }
  if (imsSqlMode_()) {
    const db = imsSqlLoad_();
    const acct = db.admins.find((a) => a.username === username && a.password === password);
    if (!acct) {
      const errEl = document.getElementById('adminError');
      if (errEl) { errEl.textContent = '❌ Username หรือ Password ไม่ถูกต้อง'; errEl.classList.remove('hidden'); }
      return;
    }
    STATE.role = 'admin';
    STATE.adminUser = username;
    STATE.adminRole = acct.role || 'super_admin';
    STATE.adminDepartmentId = null;
    STATE.currentPage = 'admin-dashboard';
    imsSqlApplyToState_();
    render();
    return;
  }
  // Production Firebase: verify via Cloud Function -> custom token with role=super_admin
  if (imsClientUsesCallableAuth_()) {
    Swal.fire({ title: 'กำลังเข้าสู่ระบบ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
    callFn_('loginSuperAdmin', { username, password })
      .then(async (out) => {
        stopFirestoreRealtime_();
        STATE.influencers = [];
        STATE.projects = [];
        STATE.posts = [];
        STATE.departments = [];
        STATE.influencerPINs = {};
        STATE.departmentCredentials = {};
        STATE.registrationCampaigns = [];
        STATE.registrationSubmissions = [];
        await firebaseSignInWithToken_(out.token);
        STATE.role = 'admin';
        STATE.adminUser = username;
        STATE.adminRole = 'super_admin';
        STATE.adminDepartmentId = null;
        STATE.currentPage = 'admin-dashboard';
        setBooting_(true);
        startFirestoreRealtime_();
        Swal.close();
        render();
      })
      .catch((e) => {
        Swal.fire({ icon: 'error', title: 'เข้าสู่ระบบไม่สำเร็จ', text: imsFormatFnError_(e) });
      });
    return;
  }
  const account = ADMIN_ACCOUNTS.find(a => a.username === username && a.password === password);
  if (!account) {
    const errEl = document.getElementById('adminError');
    if (errEl) { errEl.textContent = '❌ Username หรือ Password ไม่ถูกต้อง'; errEl.classList.remove('hidden'); }
    return;
  }
  STATE.role = 'admin';
  STATE.adminUser = username;
  STATE.adminRole = account.role;
  STATE.adminDepartmentId = null;
  STATE.currentPage = 'admin-dashboard';
  if (window._imsDb) startFirestoreRealtime_();
  render();
  syncData();
}

    callFn_('loginDeptHead', { username, password })
      .then(async (out) => {
        stopFirestoreRealtime_();
        STATE.influencers = [];

        STATE.posts = [];
        STATE.departments = [];
        STATE.influencerPINs = {};
        STATE.departmentCredentials = {};
        STATE.registrationCampaigns = [];

        const deptId = out.deptId;
        const dept = STATE.departments.find(d => d.id === deptId);

      });
    return;
  }
  // Credentials loaded from Firestore realtime.
  const credsEntries = Object.entries(STATE.departmentCredentials || {});
  const match = credsEntries.find(([deptId, creds]) => creds?.username === username && creds?.password === password);
  if (!match) {

  }

  const [deptId] = match;
  const dept = STATE.departments.find(d => d.id === deptId);
  STATE.role = 'admin';
  STATE.adminUser = username;
  STATE.adminRole = 'department_admin';
  STATE.adminDepartmentId = deptId;
  STATE.adminDepartmentName = dept?.name || '';
  STATE.currentPage = 'admin-dashboard';

}

function renderDashboard() {
  const filteredInfluencers = getFilteredInfluencers();
  const filteredProjects = getFilteredProjects();
  const filteredPosts = getFilteredPosts();
  const isSuperAdmin = STATE.adminRole === 'super_admin';
  
  // Filter posts by date and department
  const dashboardFilteredPosts = filteredPosts.filter(p => {
    const date = new Date(p.created_at);
    const matchDay = !STATE.dashboardFilterDay || date.getDate() === STATE.dashboardFilterDay;
    const matchMonth = !STATE.dashboardFilterMonth || (date.getMonth() + 1) === STATE.dashboardFilterMonth;
    const matchYear = !STATE.dashboardFilterYear || date.getFullYear() === STATE.dashboardFilterYear;
    return matchDay && matchMonth && matchYear;
  });

  const totalInfluencers = filteredInfluencers.length;
  const totalProjects = filteredProjects.length;
  const totalPosts = dashboardFilteredPosts.length;
  const deptMembers = getDepartmentMembers();

  // Calculate KPI by influencer for dashboard filtered posts
  const influencerKPI = {};
  const kpiArray = [];
  deptMembers.forEach(m => {
    const count = dashboardFilteredPosts.filter(p => p.influencer_id === m.id).length;
    influencerKPI[m.id] = count;
    kpiArray.push({ id: m.id, name: m.name, phone: m.phone, kpi: count });
  });
  
  // Sort by KPI descending
  kpiArray.sort((a, b) => b.kpi - a.kpi);

  return `
  <div class="space-y-6 max-w-7xl">
    <div class="flex items-center justify-between flex-wrap gap-3 bg-white rounded-xl p-4 gold-border">
      <h3 class="font-semibold text-dark-950 text-sm">🔍 ฟิลเตอร์ Dashboard</h3>
      <div class="flex gap-2 flex-wrap">
        <select id="dashboardFilterDaySelect" class="input-field text-sm" style="width:auto;">
          <option value="">📅 ทั้งหมด</option>
          ${Array.from({length:31},(_,i)=>i+1).map(d=>`<option value="${d}" ${d===STATE.dashboardFilterDay?'selected':''}>${d}</option>`).join('')}
        </select>
        <select id="dashboardFilterMonthSelect" class="input-field text-sm" style="width:auto;">
          <option value="">เดือน</option>
          ${Array.from({length:12},(_,i)=>i+1).map(m=>`<option value="${m}" ${m===STATE.dashboardFilterMonth?'selected':''}>${m}</option>`).join('')}
        </select>
        <select id="dashboardFilterYearSelect" class="input-field text-sm" style="width:auto;">
          <option value="">ปี</option>
          ${Array.from({length:5},(_,i)=>new Date().getFullYear()-2+i).map(y=>`<option value="${y}" ${y===STATE.dashboardFilterYear?'selected':''}>${y}</option>`).join('')}
        </select>
        <select id="dashboardFilterDeptSelect" class="input-field text-sm" style="width:auto;">
          <option value="">แผนกทั้งหมด</option>
          ${STATE.departments.map(d=>`<option value="${d.id}" ${d.id===STATE.dashboardFilterDept?'selected':''}>${d.name}</option>`).join('')}

function renderInfluencersPage() {
  const influencers = getFilteredInfluencers();

  return `
  <div class="space-y-4 max-w-7xl">
    <div class="flex flex-wrap items-center justify-between gap-2">

          <i data-lucide="upload" style="width:16px;height:16px;"></i> อัปโหลด Excel
        </button>
        <button type="button" onclick="STATE.editItem=null;STATE._infAvatarData=null;STATE.modalOpen='add-influencer';render();" class="btn-gold flex items-center gap-2 text-sm">
          <i data-lucide="plus" style="width:16px;height:16px;"></i> เพิ่ม Influencer
        </button>
      </div>
    </div>

    ${influencers.length === 0 ? '' : `
    <div class="bg-white rounded-xl gold-border overflow-hidden fade-in">
      <div class="overflow-x-auto">
        <table class="w-full min-w-[1060px]">
          <thead>
            <tr>
              <th>ชื่อ</th>
              <th>E-mail</th>
              <th>เลขบัตร ปชช.</th>
              <th>โทรศัพท์</th>
              <th>Line</th>
              <th>ลิงก์</th>
              <th>PIN</th>
              <th class="text-right">จัดการ</th>
            </tr>
          </thead>
          <tbody>
            ${influencers.map(inf => {
        const pinData = STATE.influencerPINs[inf.id];
        const pinCode = pinData ? pinData.pin : '-';
        const initial = (inf.name && inf.name.charAt(0)) ? inf.name.charAt(0) : '?';
        const em = inf.email || '';
        const nid = String(inf.national_id || '').trim();
        const esc = (s) => String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;');
        const hrefEsc = (u) => String(u).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        const socPairs = [
          ['TikTok', inf.url_tiktok],
          ['Shopee', inf.url_shopee],
          ['Facebook', inf.url_facebook],
          ['Instagram', inf.url_instagram],
          ['Lemon9', inf.url_lemon9]
        ];
        const socHtml = socPairs
          .map(([lab, raw]) => {
            const u = imsSafeHttpUrl_(raw);
            if (!u) return '';
            return `<a href="${hrefEsc(u)}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center px-2 py-0.5 rounded text-[11px] font-medium bg-dark-50 text-dark-800 hover:bg-amber-50 border border-dark-100 mr-1 mb-1">${esc(lab)}</a>`;
          })
          .filter(Boolean)
          .join('');
        return `
            <tr>
              <td>
                <div class="flex items-center gap-2">
                  <div class="w-9 h-9 shrink-0 bg-dark-950 text-white rounded-lg flex items-center justify-center text-sm font-bold">${initial}</div>
                  <div class="flex flex-col">
                    <span class="font-medium text-dark-950">${esc(inf.name || '-')}</span>
                    ${(Number(inf.rating) || 0) ? `<span class="text-xs leading-none" style="color:#f59e0b" title="${Number(inf.rating)} ดาว">${'★'.repeat(Number(inf.rating))}<span style="color:#d1d5db">${'★'.repeat(5 - Number(inf.rating))}</span></span>` : ''}
                  </div>
                </div>
              </td>
              <td class="text-dark-600 text-sm">${em ? `<a href="mailto:${encodeURIComponent(em)}" class="text-blue-600 hover:underline">${esc(em)}</a>` : '<span class="text-dark-400">—</span>'}</td>
              <td class="text-dark-600 text-sm font-mono">${nid ? esc(nid) : '<span class="text-dark-400">—</span>'}</td>
              <td class="text-dark-600">${inf.phone || '-'}</td>
              <td class="text-dark-600">${inf.line || '-'}</td>
              <td class="text-dark-600 max-w-[220px]">${socHtml || '<span class="text-dark-400">—</span>'}</td>
              <td>${pinCode !== '-' ? `<span class="px-2 py-0.5 bg-blue-100 text-blue-700 rounded text-xs font-bold">🔐 ${pinCode}</span>` : '<span class="text-dark-400">—</span>'}</td>
              <td class="text-right whitespace-nowrap">
                ${inf.tiktok_linked ? `<button type="button" data-ims-action="inf-tiktok" data-inf-id="${esc(inf.id)}" data-inf-name="${esc(inf.name || '')}" class="inline-flex items-center gap-1 px-2 py-1.5 rounded-lg text-xs font-semibold mr-1" style="background:#000;color:#fff;border:none;cursor:pointer;" title="ดู TikTok Dashboard"><i data-lucide="bar-chart-3" style="width:14px;height:14px;pointer-events:none;"></i> TikTok</button>` : ''}
                <button type="button" data-ims-action="inf-pin" data-inf-id="${esc(inf.id)}" data-inf-name="${esc(inf.name || '')}" class="inline-flex items-center gap-1 px-2 py-1.5 rounded-lg text-xs font-semibold mr-1" style="background:#3b82f6;color:#fff;border:none;cursor:pointer;" title="สร้าง PIN">
                  <i data-lucide="key" style="width:14px;height:14px;pointer-events:none;"></i> PIN
                </button>
                <button type="button" data-ims-action="inf-edit" data-inf-id="${esc(inf.id)}" class="p-2 hover:bg-dark-50 rounded transition align-middle" title="แก้ไข"><i data-lucide="pencil" style="width:16px;height:16px;color:#1a1a1f;pointer-events:none;"></i></button>
                <button type="button" data-ims-action="inf-delete" data-inf-id="${esc(inf.id)}" class="p-2 hover:bg-red-50 rounded transition align-middle" title="ลบ"><i data-lucide="trash-2" style="width:16px;height:16px;color:#ef4444;pointer-events:none;"></i></button>
              </td>
            </tr>`;
      }).join('')}
          </tbody>
        </table>
      </div>
    </div>
    `}

    ${influencers.length === 0 ? `
    <div class="bg-dark-50 rounded-xl p-8 text-center">
      <p class="text-dark-500">ยังไม่มี Influencer ในระบบ</p>
      <div class="flex flex-wrap gap-2 justify-center mt-4">
        <button type="button" onclick="openInfluencerUploadModal()" class="btn-outline">อัปโหลด Excel</button>
        <button type="button" onclick="STATE.editItem=null;STATE._infAvatarData=null;STATE.modalOpen='add-influencer';render();" class="btn-gold">เพิ่ม Influencer</button>
      </div>
    </div>
    ` : ''}
  </div>`;
}

function renderProjectsPage() {
  const projects = getFilteredProjects();

  return `
  <div class="space-y-4 max-w-7xl">
    <div class="flex items-center justify-between">
      <h2 class="text-lg font-semibold text-dark-950">โครงการและแคมเปญ</h2>
      <button onclick="STATE.editItem=null;STATE.modalOpen='add-project';render();" class="btn-gold flex items-center gap-2 text-sm">
        <i data-lucide="plus" style="width:16px;height:16px;"></i> เพิ่มโปรเจกต์
      </button>
    </div>

    <div class="bg-white rounded-xl gold-border overflow-hidden">
      <div class="overflow-auto">
        <table class="min-w-[1200px]">
          <thead>
            <tr>
              <th>ชื่อโปรเจกต์</th>
              <th>📅 Deadline</th>
              <th>⭐ Quality</th>
              <th>👥 Influencers</th>
              <th>🎬 Clips</th>
              <th>ความคืบหน้า</th>
              <th>📤 งานที่ส่งมา</th>
              <th class="text-right">Actions</th>
            </tr>
          </thead>
          <tbody>
            ${projects.map(proj => {
              const assigned = proj.assigned_influencers || [];
              const totalClips = assigned.reduce((sum, a) => sum + (a.clip_count || 0), 0);
              const completedClips = assigned.reduce((sum, a) => {
                const prog = getProjectProgress(a.id, proj.id);
                return sum + prog.done;
              }, 0);
              const progress = totalClips > 0 ? Math.round((completedClips / totalClips) * 100) : 0;
              const projPosts = STATE.posts.filter(p => p.project_id === proj.id);
              const isExpanded = STATE._expandedProject === proj.id;
              const completedPosts = projPosts.filter(p => p.status === 'completed').length;
              const pendingPosts = projPosts.filter(p => p.status === 'pending').length;
              const failedPosts = projPosts.filter(p => p.status === 'failed').length;

              const influencersLabel = assigned.slice(0, 3).map(a => {
                const inf = STATE.influencers.find(i => i.id === a.id);
                return `${inf?.name || 'Unknown'}(${a.clip_count || 0})`;
              }).join(', ');
              const more = assigned.length > 3 ? ` +${assigned.length - 3}` : '';

              return `
                <tr class="${isExpanded ? 'bg-dark-50' : ''}">
                  <td class="font-semibold text-dark-950">
                    <button onclick="STATE._expandedProject=${isExpanded ? 'null' : `'${proj.id}'`};render();"
                      class="text-left hover:underline">
                      ${proj.name || '-'}
                    </button>
                  </td>
                  <td>${proj.deadline || '-'}</td>
                  <td>${proj.quality ? proj.quality.replace('level', 'Level ') : '-'}</td>
                  <td>
                    <div class="text-xs text-dark-600">${assigned.length} คน</div>
                    <div class="text-[11px] text-dark-400">${influencersLabel}${more}</div>
                  </td>
                  <td>${totalClips}</td>
                  <td style="min-width:220px;">
                    <div class="flex items-center gap-3">
                      <div class="w-28 bg-dark-100 rounded-full h-2.5">
                        <div class="bg-gradient-to-r from-gold-400 to-gold-600 h-2.5 rounded-full transition-all" style="width:${progress}%;"></div>
                      </div>
                      <div class="text-xs font-semibold text-dark-700 whitespace-nowrap">${completedClips}/${totalClips} (${progress}%)</div>
                    </div>
                  </td>
                  <td>
                    <div class="text-xs text-dark-600">${projPosts.length} งาน</div>
                    <div class="flex gap-2 flex-wrap mt-1">
                      <span class="badge badge-pass text-[11px] font-medium">✅ ${completedPosts}</span>
                      <span class="badge badge-pending text-[11px] font-medium">⏳ ${pendingPosts}</span>
                      <span class="badge badge-fail text-[11px] font-medium">❌ ${failedPosts}</span>
                    </div>
                  </td>
                  <td class="text-right">
                    <button onclick="STATE._expandedProject=${isExpanded ? 'null' : `'${proj.id}'`};render();" class="p-2 hover:bg-dark-50 rounded transition" title="${isExpanded ? 'ย่อ' : 'รายละเอียด'}">
                      <i data-lucide="${isExpanded ? 'chevron-up' : 'chevron-down'}" style="width:16px;height:16px;color:#1a1a1f;"></i>
                    </button>
                    <button onclick="editProject('${proj.id}');" class="p-2 hover:bg-dark-50 rounded transition" title="แก้ไข">
                      <i data-lucide="pencil" style="width:16px;height:16px;color:#1a1a1f;"></i>
                    </button>
                    <button onclick="confirmDelete('project','${proj.id}');" class="p-2 hover:bg-red-50 rounded transition" title="ลบ">
                      <i data-lucide="trash-2" style="width:16px;height:16px;color:#ef4444;"></i>
                    </button>
                  </td>
                </tr>

                ${isExpanded ? `
                  <tr>
                    <td colspan="8" style="padding-top:0;">
                      <div class="border-t border-dark-100 bg-dark-50 p-5">
                        <h4 class="font-semibold text-dark-950 text-sm mb-4 flex items-center gap-2">
                          <i data-lucide="send" style="width:16px;height:16px;color:#e6ad1a;"></i>
                          📤 งานที่ส่งมา (${projPosts.length})
                        </h4>

                        ${projPosts.length === 0 ? `
                          <div class="bg-white rounded-lg p-8 text-center border-2 border-dashed border-dark-200">
                            <p class="text-dark-500 text-sm">ยังไม่มีงานที่ส่ง</p>
                            <p class="text-dark-400 text-xs mt-1">เมื่อมีการส่งงาน จะแสดงรายละเอียดที่นี่</p>
                          </div>
                        ` : `
                          <div class="bg-white rounded-xl gold-border overflow-hidden">
                            <div class="overflow-auto">
                              <table class="min-w-[1100px]">
                                <thead>
                                  <tr>
                                    <th>สถานะ</th>
                                    <th>Influencer</th>
                                    <th>dd/mm/yy</th>
                                    <th>Platform</th>
                                    <th>Link</th>
                                    <th class="text-right">Actions</th>
                                  </tr>
                                </thead>
                                <tbody>
                                  ${projPosts.map((post) => {
                                    const inf = STATE.influencers.find(i => i.id === post.influencer_id);
                                    const plat = PLATFORMS.find(p => p.id === post.platform);
                                    const postDate = new Date(post.created_at);
                                    const formattedDate = postDate.toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: '2-digit' });
                                    const formattedTime = postDate.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
                                    const statusBadge = post.status === 'completed' ? 'badge-pass' : post.status === 'pending' ? 'badge-pending' : 'badge-fail';
                                    const statusText = post.status === 'completed' ? '✅ เสร็จสิ้น' : post.status === 'pending' ? '⏳ รอตรวจสอบ' : '❌ ไม่ผ่าน';
                                    return `
                                      <tr>
                                        <td><span class="badge ${statusBadge} text-[11px] whitespace-nowrap">${statusText}</span></td>
                                        <td class="font-semibold text-dark-950">${inf?.name || 'Unknown'}</td>
                                        <td class="text-xs text-dark-600 whitespace-nowrap">${formattedDate} <span class="text-dark-400">•</span> ${formattedTime}</td>
                                        <td class="text-xs text-dark-600 whitespace-nowrap">
                                          <span class="mr-1">${plat?.icon || '📱'}</span>${plat?.name || 'Unknown'}
                                        </td>
                                        <td style="min-width:360px;">
                                          <a href="${post.link}" target="_blank" rel="noopener noreferrer"
                                             class="inline-flex items-center gap-2 w-full bg-blue-50 hover:bg-blue-100 text-blue-700 px-3 py-2 rounded-lg text-xs font-semibold transition min-w-0">
                                            <i data-lucide="external-link" style="width:13px;height:13px;"></i>
                                            <span class="truncate">${post.link || ''}</span>
                                          </a>
                                        </td>
                                        <td class="text-right">
                                          <button onclick="confirmDelete('post','${post.id}');" class="p-2 hover:bg-red-50 rounded transition" title="ลบ">
                                            <i data-lucide="trash-2" style="width:16px;height:16px;color:#ef4444;"></i>
                                          </button>
                                        </td>
                                      </tr>
                                    `;
                                  }).join('')}
                                </tbody>
                              </table>
                            </div>
                          </div>
                        `}
                      </div>
                    </td>
                  </tr>
                ` : ''}
              `;
            }).join('')}
          </tbody>
        </table>
      </div>

      ${projects.length === 0 ? `
        <div class="p-8 text-center bg-dark-50 border-t border-dark-100">
          <p class="text-dark-600 font-semibold">ยังไม่มีโปรเจกต์</p>

        </div>
      ` : ''}

    ${projects.length === 0 ? `

      <p class="text-lg font-semibold text-dark-950 mb-2">📁 ยังไม่มีโปรเจกต์</p>
      <p class="text-dark-500 text-sm mb-4">เริ่มต้นด้วยการสร้างโปรเจกต์แรก</p>
      <button onclick="STATE.editItem=null;STATE.modalOpen='add-project';render();" class="btn-gold inline-flex items-center gap-2 text-sm">
        <i data-lucide="plus" style="width:16px;height:16px;"></i> สร้างโปรเจกต์
      </button>
    </div>

function fmtDateTH_(s) {
  const v = String(s || '').trim();
  if (!v) return '';
  return v;
}

function toDateInputValue_(s) {
  // Accept dd/mm/yy, dd/mm/yyyy, yyyy-mm-dd
  const v = String(s || '').trim();
  if (!v) return '';
  if (/^\d{4}-\d{2}-\d{2}$/.test(v)) return v;
  const m = v.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
  if (!m) return '';
  const dd = String(m[1]).padStart(2, '0');
  const mm = String(m[2]).padStart(2, '0');
  let yy = String(m[3]);
  if (yy.length === 2) yy = '20' + yy;
  return `${yy}-${mm}-${dd}`;
}

function fromDateInputValue_(v) {
  const s = String(v || '').trim();
  if (!/^\d{4}-\d{2}-\d{2}$/.test(s)) return '';
  const [yy, mm, dd] = s.split('-');
  return `${dd}/${mm}/${yy.slice(-2)}`;
}

function fmtMoney_(v) {
  if (v === '' || v === null || v === undefined) return '';
  const n = Number(v);
  if (Number.isNaN(n)) return String(v);
  return n.toLocaleString('th-TH');
}

const IMS_INFLUENCER_IMPORT_FIELDS = [
  { key: 'name', aliases: ['name', 'ชื่อ', 'influencer_name', 'ชื่อ_influencer', 'ชื่อinfluencer'] },
  { key: 'email', aliases: ['email', 'e_mail', 'e-mail', 'อีเมล', 'อีเมล์'] },
  { key: 'national_id', aliases: ['national_id', 'nationalid', 'เลขบัตร', 'เลขบัตรประชาชน', 'เลขบัตร_ปชช', 'เลขบัตรปชช', 'id_card'] },
  { key: 'phone', aliases: ['phone', 'โทรศัพท์', 'เบอร์โทร', 'เบอร์', 'tel', 'mobile'] },
  { key: 'line', aliases: ['line', 'line_id', 'ไลน์'] },
  { key: 'url_tiktok', aliases: ['url_tiktok', 'tiktok', 'ลิงก์_tiktok'] },
  { key: 'url_shopee', aliases: ['url_shopee', 'shopee', 'ลิงก์_shopee'] },
  { key: 'url_facebook', aliases: ['url_facebook', 'facebook', 'fb', 'ลิงก์_facebook'] },
  { key: 'url_instagram', aliases: ['url_instagram', 'instagram', 'ig', 'ลิงก์_instagram'] },
  { key: 'url_lemon9', aliases: ['url_lemon9', 'lemon9', 'lemon_9', 'ลิงก์_lemon9'] },
  { key: 'pin', aliases: ['pin', 'pin_code', 'รหัสpin', 'รหัส_pin'] }
];

function imsNormalizeImportHeader_(h) {
  return String(h ?? '')
    .trim()
    .toLowerCase()
    .replace(/\ufeff/g, '')
    .replace(/[\s\-]+/g, '_')
    .replace(/[^\w\u0e00-\u0e7f]/g, '');
}

function imsCellToString_(v) {
  if (v === null || v === undefined) return '';
  if (typeof v === 'number' && Number.isFinite(v)) return String(v);
  return String(v).trim();
}

function mapInfluencerImportRow_(raw, rowNum) {
  const norm = {};
  Object.keys(raw || {}).forEach((k) => {
    const nk = imsNormalizeImportHeader_(k);
    if (nk) norm[nk] = raw[k];
  });
  const pick = (field) => {
    if (!field || !field.aliases) return '';
    for (const alias of field.aliases) {
      const nk = imsNormalizeImportHeader_(alias);
      if (Object.prototype.hasOwnProperty.call(norm, nk)) {
        return imsCellToString_(norm[nk]);
      }
    }
    return '';
  };
  const name = pick(IMS_INFLUENCER_IMPORT_FIELDS[0]);
  if (!name) return { ok: false, error: 'ไม่มีชื่อ', rowNum };
  const national_id = pick(IMS_INFLUENCER_IMPORT_FIELDS.find(f => f.key === 'national_id')).replace(/\D/g, '');
  if (national_id && national_id.length !== 13) {
    return { ok: false, error: 'เลขบัตรประชาชนต้องเป็นตัวเลข 13 หลัก', rowNum };
  }
  const pinRaw = pick(IMS_INFLUENCER_IMPORT_FIELDS.find(f => f.key === 'pin')).replace(/\D/g, '');
  if (pinRaw && pinRaw.length !== 4) {
    return { ok: false, error: 'PIN ต้องเป็นตัวเลข 4 หลัก', rowNum };
  }
  const data = {
    name,
    email: pick(IMS_INFLUENCER_IMPORT_FIELDS.find(f => f.key === 'email')),
    national_id,
    phone: pick(IMS_INFLUENCER_IMPORT_FIELDS.find(f => f.key === 'phone')),
    line: pick(IMS_INFLUENCER_IMPORT_FIELDS.find(f => f.key === 'line')),
    url_tiktok: imsSafeHttpUrl_(pick(IMS_INFLUENCER_IMPORT_FIELDS.find(f => f.key === 'url_tiktok'))) || '',
    url_shopee: imsSafeHttpUrl_(pick(IMS_INFLUENCER_IMPORT_FIELDS.find(f => f.key === 'url_shopee'))) || '',
    url_facebook: imsSafeHttpUrl_(pick(IMS_INFLUENCER_IMPORT_FIELDS.find(f => f.key === 'url_facebook'))) || '',
    url_instagram: imsSafeHttpUrl_(pick(IMS_INFLUENCER_IMPORT_FIELDS.find(f => f.key === 'url_instagram'))) || '',
    url_lemon9: imsSafeHttpUrl_(pick(IMS_INFLUENCER_IMPORT_FIELDS.find(f => f.key === 'url_lemon9'))) || ''
  };
  if (pinRaw) data._pin = pinRaw;
  return { ok: true, data, rowNum };
}

function parseInfluencerImportWorkbook_(wb) {
  const sheetName = wb.SheetNames[0];
  if (!sheetName) return { rows: [], invalid: [{ rowNum: 0, error: 'ไฟล์ไม่มีชีตข้อมูล' }] };
  const sheet = wb.Sheets[sheetName];
  const json = XLSX.utils.sheet_to_json(sheet, { defval: '', raw: false });
  const rows = [];
  const invalid = [];
  json.forEach((raw, idx) => {
    const rowNum = idx + 2;
    const mapped = mapInfluencerImportRow_(raw, rowNum);
    if (mapped.ok) rows.push(mapped.data);
    else if (mapped.error !== 'ไม่มีชื่อ' || Object.values(raw).some((v) => imsCellToString_(v))) {
      invalid.push({ rowNum, error: mapped.error, name: imsCellToString_(raw.name || raw.ชื่อ || '') });
    }
  });
  return { rows, invalid };
}

async function parseInfluencerImportFile_(file) {
  if (!window.XLSX) throw new Error('ไม่พบไลบรารี Excel — รีเฟรชหน้าแล้วลองใหม่');
  const name = String(file.name || '').toLowerCase();
  const buf = await file.arrayBuffer();
  const wb = XLSX.read(buf, { type: 'array' });
  const { rows, invalid } = parseInfluencerImportWorkbook_(wb);
  if (!rows.length && !invalid.length) {
    throw new Error('ไม่พบแถวข้อมูลในไฟล์');
  }
  if (rows.length > 500) {
    throw new Error('นำเข้าได้สูงสุด 500 คนต่อไฟล์');
  }
  return { rows, invalid, fileName: file.name };
}

async function runInfluencerBulkImport_() {
  const preview = STATE._influencerImportPreview;
  if (!preview?.rows?.length) {
    Swal.fire({ icon: 'warning', title: 'ยังไม่มีไฟล์', text: 'เลือกไฟล์ Excel ก่อน' });
    return;
  }
  if (!imsSqlMode_() && !imsApiMode_() && !window._imsDb) {
    Swal.fire({ icon: 'error', title: 'Firebase ยังไม่พร้อม', text: 'รัน npm run dev หรือตรวจสอบการเชื่อมต่อ' });
    return;
  }
  const confirm = await Swal.fire({
    icon: 'question',
    title: 'ยืนยันนำเข้า',
    html: `นำเข้า <b>${preview.rows.length}</b> Influencer จากไฟล์<br><span class="text-sm text-dark-500">${preview.fileName || ''}</span>`,
    showCancelButton: true,
    confirmButtonText: 'นำเข้า',
    cancelButtonText: 'ยกเลิก'
  });
  if (!confirm.isConfirmed) return;

  Swal.fire({ title: 'กำลังนำเข้า...', html: '0 / ' + preview.rows.length, allowOutsideClick: false, didOpen: () => Swal.showLoading() });
  const base = Date.now();
  let ok = 0;
  let fail = 0;
  const errors = [];
  for (let i = 0; i < preview.rows.length; i++) {
    const src = preview.rows[i];
    const id = 'inf_' + base + '_' + i;
    const payload = {
      id,
      name: src.name,
      phone: src.phone || '',
      line: src.line || '',
      email: src.email || '',
      national_id: src.national_id || '',
      url_tiktok: src.url_tiktok || '',
      url_shopee: src.url_shopee || '',
      url_facebook: src.url_facebook || '',
      url_instagram: src.url_instagram || '',
      url_lemon9: src.url_lemon9 || '',
      created_at: new Date().toISOString()
    };
    const res = await dataAction('createInfluencer', payload);
    if (res.success) {
      ok++;
      const infId = res.data?.id || id;
      if (src._pin) {
        const pinRes = await dataAction('setInfluencerPIN', {
          influencer_id: infId,
          pin: src._pin,
          created_at: new Date().toISOString()
        });
        if (!pinRes.success) {
          errors.push({ row: i + 2, name: src.name, error: 'สร้าง PIN ไม่สำเร็จ: ' + (pinRes.error || '') });
        }
      }
    } else {
      fail++;
      errors.push({ row: i + 2, name: src.name, error: res.error || 'ไม่ทราบสาเหตุ' });
    }
    if (i % 5 === 0 || i === preview.rows.length - 1) {
      Swal.update({ html: `${ok + fail} / ${preview.rows.length}` });
    }
  }
  broadcastDataUpdate('bulkImportInfluencers');
  await syncData({ silent: true });
  closeModal();
  const errLines = errors.slice(0, 5).map((e) => `แถว ${e.row}: ${e.name} — ${e.error}`).join('<br>');
  await Swal.fire({
    icon: fail && !ok ? 'error' : fail ? 'warning' : 'success',
    title: 'นำเข้าเสร็จ',
    html: `สำเร็จ <b>${ok}</b> คน${fail ? `, ไม่สำเร็จ <b>${fail}</b> คน` : ''}${errLines ? '<br><br><span class="text-xs text-left">' + errLines + '</span>' : ''}`,
    confirmButtonText: 'ตกลง'
  });
}

function closeModal() {
  STATE.modalOpen = null;

}

function confirmDelete(type, id) {
  STATE.deleteTarget = { type, id };
  STATE.modalOpen = 'confirm-delete';
  render();
}

async function executeDelete() {
  const { type, id } = STATE.deleteTarget || {};
  if (!type || !id) return;
  if (type === 'influencer') await deleteRecord('deleteInfluencer', { id });
  else if (type === 'project') await deleteRecord('deleteProject', { id });
  else if (type === 'post') await deleteRecord('deletePost', { id });
  else if (type === 'department') await deleteRecord('deleteDepartment', { id });
  else if (type === 'registration_campaign') await deleteRecord('deleteRegistrationCampaign', { id });
  closeModal();
}

async function generateInfluencerPIN(influencerId, influencerName) {
  if (!imsSqlMode_() && !imsApiMode_() && !window._imsDb) {
    Swal.fire({ icon: 'error', title: 'Firebase ยังไม่พร้อม', text: 'รัน npm run dev หรือตรวจสอบการเชื่อมต่อ' });
    return;
  }
  const pin = Math.floor(1000 + Math.random() * 9000).toString();
  const payload = { influencer_id: influencerId, pin, created_at: new Date().toISOString() };
  let res;
  try {
    res = await dataAction('setInfluencerPIN', payload);
  } catch (err) {
    Swal.fire({ icon: 'error', title: 'บันทึก PIN ไม่สำเร็จ', text: err?.message || String(err) });
    return;
  }
  if (res?.success) {
    STATE.influencerPINs[influencerId] = payload;
    broadcastDataUpdate('setInfluencerPIN');
  } else {
    Swal.fire({ icon: 'error', title: 'บันทึก PIN ไม่สำเร็จ', text: res?.error || 'ตรวจสอบการเชื่อมต่อ Firebase' });
    return;
  }
  STATE.generatedPIN = pin;
  STATE.editItem = STATE.influencers.find(i => i.id === influencerId);
  STATE.modalOpen = 'show-pin';
  render();
  Swal.fire({
    icon: 'success',
    title: 'สร้าง PIN สำเร็จ! 🎉',
    text: 'PIN ได้ถูกสร้างและพร้อมส่งให้กับ ' + influencerName,
    timer: 2000,
    showConfirmButton: false
  });
}

async function generateDepartmentCredentials(departmentId, departmentName) {
  if (STATE.adminRole !== 'super_admin') {
    Swal.fire({
      icon: 'warning',
      title: 'สิทธิ์ไม่เพียงพอ',
      text: 'เฉพาะ Super Admin เท่านั้นที่สามารถกำหนด Username & Password ของแผนกได้'
    });
    return;
  }
  if (!STATE.departmentCredentials) {
    STATE.departmentCredentials = {};
  }
  const username = 'admin_' + departmentName.toLowerCase().replace(/\\s+/g, '_') + '_' + Math.floor(Math.random() * 1000);
  const password = Math.random().toString(36).slice(-12);
  const payload = { department_id: departmentId, username, password, created_at: new Date().toISOString() };
  const res = await dataAction('setDepartmentCredentials', payload);
  if (res?.success) {
    STATE.departmentCredentials[departmentId] = { username, password, created_at: payload.created_at };
    broadcastDataUpdate('setDepartmentCredentials');
  } else {
    Swal.fire({ icon: 'error', title: 'บันทึกข้อมูลแผนกไม่สำเร็จ', text: res?.error || 'ตรวจสอบการเชื่อมต่อ Firebase' });
    return;
  }
  STATE.generatedCredentials = { username, password };
  STATE.editItem = STATE.departments.find(d => d.id === departmentId);
  STATE.modalOpen = 'show-department-credentials';
  render();
  Swal.fire({
    icon: 'success',
    title: 'สร้าง Username & Password สำเร็จ! 🎉',
    text: 'ข้อมูลเข้าสู่ระบบได้ถูกสร้างสำหรับแผนก ' + departmentName,
    timer: 2000,
    showConfirmButton: false
  });
}

function copyToClipboard(text) {
  navigator.clipboard.writeText(text).then(() => {
    Swal.fire({
      icon: 'success',
      title: 'คัดลอกสำเร็จ!',
      text: 'ข้อมูลได้ถูกคัดลอกไปยังคลิปบอร์ด',
      timer: 1200,
      showConfirmButton: false
    });
  }).catch(() => {
    Swal.fire({
      icon: 'error',
      title: 'ไม่สามารถคัดลอก',

function buildUpdatePostPayload_(post, overrides) {
  return {
    id: post.id,
    influencer_id: post.influencer_id,
    project_id: post.project_id,
    platform: post.platform,
    link: post.link,
    status: post.status,
    rejection_reason: post.rejection_reason || '',
    created_at: post.created_at,
    ...overrides
  };
}

async function updatePostStatus(postId, newStatus) {
  const post = STATE.posts.find(p => p.id === postId);
  if (!post) return;
  let rejection_reason = post.rejection_reason || '';
  if (newStatus === 'completed') rejection_reason = '';
  if (newStatus === 'failed' && !post.rejection_reason) rejection_reason = '';
  const payload = buildUpdatePostPayload_(post, { status: newStatus, rejection_reason });
  const statusText = newStatus === 'completed' ? 'อนุมัติ' : newStatus === 'pending' ? 'รอตรวจสอบ' : 'ปฏิเสธ';
  await saveRecord('updatePost', payload, 'สถานะงานเปลี่ยนเป็น ' + statusText);
}

function promptRejection(postId, creatorName) {
  Swal.fire({
    title: 'ปฏิเสธการส่งงาน',
    html: `<textarea id="rejectionReason" class="swal2-textarea" placeholder="กรุณาระบุเหตุผลการปฏิเสธ..." style="width:100%;padding:10px;border:1px solid #ccc;border-radius:6px;font-size:14px;"></textarea>`,
    icon: 'warning',
    showCancelButton: true,
    confirmButtonText: 'ปฏิเสธ',
    cancelButtonText: 'ยกเลิก',
    confirmButtonColor: '#ef4444',
    preConfirm: () => {
      const reason = document.getElementById('rejectionReason').value;
      if (!reason.trim()) {
        Swal.showValidationMessage('กรุณาระบุเหตุผล');
        return false;
      }
      return reason;
    }
  }).then((result) => {
    if (result.isConfirmed) {
      rejectPostWithReason(postId, result.value, creatorName);
    }
  });
}

async function rejectPostWithReason(postId, reason, creatorName) {
  const post = STATE.posts.find(p => p.id === postId);
  if (!post) return;
  const payload = buildUpdatePostPayload_(post, { status: 'failed', rejection_reason: reason });
  Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
  const res = await dataAction('updatePost', payload);
  Swal.close();
  if (res?.success) {
    broadcastDataUpdate('rejectPostWithReason');
    await syncData({ silent: true });
    Swal.fire({
      icon: 'success',
      title: 'ปฏิเสธสำเร็จ',
      html: `<p style="margin-top:10px;">ส่งข้อมูลการปฏิเสธให้ <strong>${creatorName}</strong> แล้ว</p><p style="color:#ef4444;font-size:12px;margin-top:8px;">${reason}</p>`,
      timer: 2000,
      showConfirmButton: false
    });
  } else {
    Swal.fire({ icon: 'error', title: 'บันทึกไม่สำเร็จ', text: res?.error || 'ตรวจสอบการเชื่อมต่อ Firebase' });
  }
}

function imsBindDelegatedClicks_() {
  const app = document.getElementById('app');
  if (!app || app.dataset.imsDelegated === '1') return;
  app.dataset.imsDelegated = '1';
  app.addEventListener('click', (e) => {
    const btn = e.target.closest('[data-ims-action]');
    if (!btn) return;
    const action = btn.getAttribute('data-ims-action');
    const infId = btn.getAttribute('data-inf-id');
    if (!infId) return;
    if (action === 'inf-edit') {
      e.preventDefault();
      editInfluencer(infId);
    } else if (action === 'inf-delete') {
      e.preventDefault();
      confirmDelete('influencer', infId);
    } else if (action === 'inf-pin') {
      e.preventDefault();
      const infName = btn.getAttribute('data-inf-name') || '';
      generateInfluencerPIN(infId, infName);
    } else if (action === 'inf-tiktok') {
      e.preventDefault();
      const infName = btn.getAttribute('data-inf-name') || '';
      openAdminTikTokDashboard_(infId, infName);
    }
  });
}

  if (dashboardFilterYearSelect) {
    dashboardFilterYearSelect.addEventListener('change', (e) => {
      STATE.dashboardFilterYear = e.target.value ? parseInt(e.target.value) : null;
      render();
    });
  }

  const dashboardFilterDeptSelect = document.getElementById('dashboardFilterDeptSelect');
  if (dashboardFilterDeptSelect) {
    dashboardFilterDeptSelect.addEventListener('change', (e) => {
      STATE.dashboardFilterDept = e.target.value ? e.target.value : null;
      // Only super admin can switch department context from dashboard filter.
      if (STATE.adminRole === 'super_admin' && STATE.dashboardFilterDept) {
        STATE.adminDepartmentId = STATE.dashboardFilterDept;
      }
      render();
    });
  }

}

if (window.elementSdk) {
  window.elementSdk.init({
    defaultConfig,
    onConfigChange: async (config) => {
      STATE._config = config;
      const title = config.system_title || defaultConfig.system_title;
      const company = config.company_name || defaultConfig.company_name;
      document.body.style.fontFamily = `${config.font_family || defaultConfig.font_family}, Sarabun, sans-serif`;
      document.body.style.fontSize = (config.font_size || defaultConfig.font_size) + 'px';
      const loginTitle = document.getElementById('loginTitle');
      if (loginTitle) loginTitle.textContent = title;
      const loginCompany = document.getElementById('loginCompany');
      if (loginCompany) loginCompany.textContent = company;
    },
    mapToCapabilities: (config) => ({
      recolorables: [
        { get: () => config.primary_color || defaultConfig.primary_color, set: (v) => { config.primary_color = v; window.elementSdk.setConfig({ primary_color: v }); } },
      ],
      borderables: [],
      fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
      fontSizeable: { get: () => config.font_size || defaultConfig.font_size, set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); } },
    }),
    mapToEditPanelValues: (config) => new Map([
      ['system_title', config.system_title || defaultConfig.system_title],
      ['company_name', config.company_name || defaultConfig.company_name],
    ])
  });
}

restoreSessionAtBoot_();
initFirebaseIfConfigured_();
// When user enters system (any role), show loader until first realtime snapshot arrives.
try {
  if (STATE.role && window._imsDb && imsSkipAnonymousFirestoreBootstrap_()) {
    setBooting_(true);
  }
} catch {}
render();
bootstrapFirebaseRealtimeAfterReload_();
// TikTok OAuth redirect กลับมาที่ ?code=... -> แลก token แล้วล็อกอิน
try { handleTikTokCallbackIfPresent_(); } catch {}
// โหลดข้อมูลครั้งแรก (Firestore realtime)
syncData({ silent: true }).finally(() => {
  ensureRealtime();
});

// ให้ปุ่ม inline onclick / delegation เรียกได้เสมอ
window.editInfluencer = editInfluencer;
window.confirmDelete = confirmDelete;
window.executeDelete = executeDelete;
window.generateInfluencerPIN = generateInfluencerPIN;
window.closeModal = closeModal;
window.openInfluencerUploadModal = openInfluencerUploadModal;
window.openRegistrationCampaignModal = openRegistrationCampaignModal;
window.openRegistrationApplicantsModal = openRegistrationApplicantsModal;
window.openCreatorRegistrationModal = openCreatorRegistrationModal;
window.reviewRegistrationSubmission_ = reviewRegistrationSubmission_;
window.downloadInfluencerImportTemplate = downloadInfluencerImportTemplate;
window.imsExportSqlFile = imsExportSqlFile;
window.imsImportSqlFile = imsImportSqlFile;
window.startTikTokLogin = startTikTokLogin;

/* --- END: Remaining functions --- */
  </script>
