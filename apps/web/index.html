    // Load SheetJS with fallback (some CDNs may be blocked by ORB)
    (function loadXLSX() {
      const sources = [
        'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js',
        'https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js'
      ];
      function tryNext(i) {
        if (i >= sources.length) return;
        const s = document.createElement('script');
        s.src = sources[i];
        s.async = true;
        s.onload = () => {};
        s.onerror = () => tryNext(i + 1);
        document.head.appendChild(s);
      }
      tryNext(0);
    })();
  </script>

/** เซสชันล็อกอิน (เฉพาะแท็บ) — รีเฟรชแล้วไม่เด้งกลับหน้า login */

function imsUrlFlag_(key, val) {
  try {
    return new URLSearchParams(String(location.search || '')).get(key) === val;
  } catch {
    return false;
  }
}

function imsClientUsesCallableAuth_() {
  if (imsUrlFlag_('auth', 'local')) return false;
  return !!(IMS_USE_FIREBASE_AUTH && window._imsDb && window._imsFunctions && !window.IMS_USE_FIRESTORE_EMULATOR);
}

function imsFormatFnError_(e) {
  const code = String(e?.code || '');
  const msg = String(e?.message || e || '');
  if (
    code.includes('internal') ||
    code.includes('unavailable') ||
    code.includes('not-found') ||
    /functions\/internal/i.test(msg)
  ) {
    return 'ระบบล็อกอินบน Cloud ยังไม่พร้อม (Cloud Functions ยังไม่ได้ deploy)\n\n'
      + '1) อัปเกรด Blaze + ผูกบัตรที่ Firebase Console\n'
      + '2) สร้าง App Engine (npm run firebase:setup-app-engine)\n'
      + '3) รัน npm run firebase:deploy:functions\n'
      + '4) สร้างแอดมินใน Firestore collection admins\n\n'
      + 'ทดสอบบนเครื่องได้ทันที: npm run dev (admin / admin123)';
  }
  if (code.includes('permission-denied') || /invalid credentials|invalid pin/i.test(msg)) {
    return 'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง';
  }
  return msg || 'เกิดข้อผิดพลาด';
}

async function firebaseSignInWithToken_(token) {
  if (!window._imsAuth) throw new Error('Firebase Auth not initialized');
  const cred = await window._imsAuth.signInWithCustomToken(token);
  try {
    // Ensure custom claims are present before starting Firestore listeners.
    const u = cred?.user || window._imsAuth.currentUser;
    if (u && typeof u.getIdTokenResult === 'function') {
      const r = await u.getIdTokenResult(true);
      STATE._authClaims = r?.claims || null;
      // Fast-path: derive role context from claims to avoid waiting on department doc reads.
      try {
        const c = STATE._authClaims || {};
        if (c.role === 'creator' && c.deptId) {
          STATE.creatorDepartmentId = String(c.deptId);
        }
      } catch {}
      if (typeof console !== 'undefined' && console.info) console.info('[IMS] Auth claims', STATE._authClaims);
    }
  } catch (e) {
    console.warn('[IMS] getIdTokenResult failed', e);
  }
}

async function callFn_(name, data) {
  if (!window._imsFunctions) throw new Error('Cloud Functions not initialized');
  const fn = window._imsFunctions.httpsCallable(name);
  const res = await fn(data || {});
  return res?.data;
}

function serializeSession_() {
  if (!STATE.role || STATE.currentPage === 'login') return null;
  const o = {
    v: 1,
    role: STATE.role,
    currentPage: STATE.currentPage,
    adminUser: STATE.adminUser || null,
    adminRole: STATE.adminRole || null,
    adminDepartmentId: STATE.adminDepartmentId || null,
    adminDepartmentName: STATE.adminDepartmentName || null
  };
  if (STATE.role === 'creator' && STATE.currentUser) {
    o.creatorUser = {
      id: STATE.currentUser.id,
      name: STATE.currentUser.name || '',
      phone: STATE.currentUser.phone || '',
      line: STATE.currentUser.line || ''
    };
  }
  return o;
}

function persistSessionIfLoggedIn_() {
  try {
    const data = serializeSession_();
    if (data) sessionStorage.setItem(IMS_SESSION_KEY, JSON.stringify(data));
    else sessionStorage.removeItem(IMS_SESSION_KEY);
  } catch {}
}

function applyRestoredSession_(snap) {
  STATE.role = snap.role;
  STATE.currentPage = snap.role === 'creator'
    ? 'creator-home'
    : (IMS_ADMIN_PAGES.has(snap.currentPage) ? snap.currentPage : 'admin-dashboard');
  STATE.adminUser = snap.adminUser || null;
  STATE.adminRole = snap.adminRole || null;
  STATE.adminDepartmentId = snap.adminDepartmentId || null;
  STATE.adminDepartmentName = snap.adminDepartmentName || '';
  if (snap.role === 'creator' && snap.creatorUser && snap.creatorUser.id) {
    STATE.currentUser = { ...snap.creatorUser };
  } else {
    STATE.currentUser = null;
  }
}

function restoreSessionAtBoot_() {
  try {
    const raw = sessionStorage.getItem(IMS_SESSION_KEY);
    if (!raw) return;
    const snap = JSON.parse(raw);
    if (!snap || snap.v !== 1 || !snap.role) return;
    if (snap.role === 'creator' && (!snap.creatorUser || !snap.creatorUser.id)) return;
    applyRestoredSession_(snap);
  } catch {}
}

function refreshCurrentUserFromInfluencers_() {
  if (STATE.role !== 'creator' || !STATE.currentUser?.id) return;
  if (imsSkipAnonymousFirestoreBootstrap_() && !_fbCreatorDocSnapDone) return;
  const live = STATE.influencers.find(i => i.id === STATE.currentUser.id);
  if (live) STATE.currentUser = live;
  else {
    try { sessionStorage.removeItem(IMS_SESSION_KEY); } catch {}
    STATE.role = null;
    STATE.currentPage = 'login';
    STATE.currentUser = null;
  }
}

function validateRestoredAdminSession_() {
  if (STATE.role !== 'admin' || STATE.adminRole !== 'department_admin' || !STATE.adminDepartmentId) return;
  if (imsSkipAnonymousFirestoreBootstrap_() && !_fbDeptDocSnapDone) return;
  const ok = (STATE.departments || []).some(d => d.id === STATE.adminDepartmentId);
  if (!ok) {
    try { sessionStorage.removeItem(IMS_SESSION_KEY); } catch {}
    STATE.role = null;
    STATE.currentPage = 'login';
    STATE.adminUser = null;
    STATE.adminRole = null;
    STATE.adminDepartmentId = null;
    STATE.adminDepartmentName = null;
  }
}

function logoutFromApp() {
  try { sessionStorage.removeItem(IMS_SESSION_KEY); } catch {}
  try {
    if (window._imsAuth && typeof window._imsAuth.signOut === 'function') window._imsAuth.signOut();
  } catch {}
  stopFirestoreRealtime_();
  // Clear in-memory datasets to avoid cross-role data leakage (e.g. super admin → dept head).
  STATE.influencers = [];
  STATE.projects = [];
  STATE.posts = [];
  STATE.departments = [];
  STATE.influencerPINs = {};
  STATE.departmentCredentials = {};
  STATE.registrationCampaigns = [];
  STATE.registrationSubmissions = [];
  STATE._tiktokDash = null;
  STATE.currentPage = 'login';
  STATE.role = null;
  STATE.adminUser = null;
  STATE.adminRole = null;
  STATE.adminDepartmentId = null;
  STATE.adminDepartmentName = null;
  STATE.currentUser = null;
  STATE._loginTab = null;
  if (imsApiMode_()) imsApiSetToken_(null);
  if (imsSqlMode_()) imsSqlApplyToState_();
  render();
}

// Data layer: Firebase Firestore (+ Cloud Functions สำหรับล็อกอิน production)

async function dataAction(action, data = {}) {
  if (imsApiMode_()) return imsApiFetch_('/action', { method: 'POST', body: { action, data } });
  if (imsSqlMode_()) return sqlDataAction_(action, data);
  if (!window._imsDb) {
    return {
      success: false,
      error: 'Firebase ยังไม่พร้อม — รัน npm run dev (emulator) หรือตั้ง apps/web/firebase-config.local.js แล้วเปิด ?prod=1'
    };
  }
  return firestoreGasAction_(action, data);
}

// ============================================================
// SQL backend (client-side, localStorage) — ไม่มี server/API
// เก็บข้อมูลใน localStorage และ import/export เป็นไฟล์ database.sql
// ============================================================
function imsSqlMode_() { return window.IMS_BACKEND === 'sql'; }

// ============================================================
// MySQL backend (ผ่าน API ของ scripts/db-server.mjs)
// ============================================================
function imsApiMode_() { return window.IMS_BACKEND === 'mysql'; }
const IMS_API = { base: '/api', token: null, KEY: 'ims_api_token_v1' };

function imsApiLoadToken_() {
  if (IMS_API.token) return IMS_API.token;
  try { IMS_API.token = sessionStorage.getItem(IMS_API.KEY) || null; } catch {}
  return IMS_API.token;
}
function imsApiSetToken_(t) {
  IMS_API.token = t || null;
  try { if (t) sessionStorage.setItem(IMS_API.KEY, t); else sessionStorage.removeItem(IMS_API.KEY); } catch {}
}
async function imsApiFetch_(path, { method = 'GET', body } = {}) {
  const headers = { 'Content-Type': 'application/json' };
  const tok = imsApiLoadToken_();
  if (tok) headers['x-ims-token'] = tok;
  const res = await fetch(IMS_API.base + path, { method, headers, body: body ? JSON.stringify(body) : undefined });
  let json = null;
  try { json = await res.json(); } catch {}
  if (res.status === 401) { // token หมดอายุ/เซิร์ฟเวอร์รีสตาร์ท -> กลับหน้า login
    if (STATE.role) { imsApiSetToken_(null); logoutFromApp(); }
    return json || { success: false, error: 'unauthorized' };
  }
  return json || { success: false, error: 'เซิร์ฟเวอร์ไม่ตอบสนอง (HTTP ' + res.status + ')' };
}
// นำ snapshot จาก server ใส่ STATE.* (ถูก filter ตามสิทธิ์มาแล้ว)
function imsApiApplySnapshot_(data) {
  if (!data) return;
  STATE.influencers = data.influencers || [];
  STATE.projects = data.projects || [];
  STATE.posts = data.posts || [];
  STATE.departments = data.departments || [];
  STATE.influencerPINs = data.influencerPINs || {};
  STATE.departmentCredentials = data.departmentCredentials || {};
  STATE.registrationCampaigns = data.registrationCampaigns || [];
  STATE.registrationSubmissions = data.registrationSubmissions || [];
}
async function imsApiSnapshot_() {
  const r = await imsApiFetch_('/snapshot');
  if (r && r.success) imsApiApplySnapshot_(r.data);
  return r;
}

  JSON_COLS: {

  db: null

function imsSqlDefault_() {
  const env = (typeof window !== 'undefined' && window.IMS_ENV) || {};
  return {
    admins: [{ username: env.ADMIN_USERNAME || 'admin', password: env.ADMIN_PASSWORD || 'admin', role: 'super_admin', created_at: '2026-05-29T00:00:00.000Z' }],
    influencers: [], influencer_pins: [], departments: [], department_credentials: [],
    projects: [], posts: [], registration_campaigns: [], registration_submissions: []
  };
}

function imsSqlLoad_() {
  if (IMS_SQL.db) return IMS_SQL.db;
  let db = null;
  try {
    const raw = localStorage.getItem(IMS_SQL.KEY);
    if (raw) db = JSON.parse(raw);
  } catch {}
  if (!db || typeof db !== 'object') db = imsSqlDefault_();
  IMS_SQL.TABLES.forEach((t) => { if (!Array.isArray(db[t])) db[t] = []; });
  if (!db.admins.length) db.admins = imsSqlDefault_().admins; // กันลืม admin
  IMS_SQL.db = db;
  return db;
}

function imsSqlSave_() {
  imsSqlLoad_();
  try { localStorage.setItem(IMS_SQL.KEY, JSON.stringify(IMS_SQL.db)); } catch (e) { console.warn('[SQL] save failed', e); }
  try { localStorage.setItem(IMS_SQL.KEY + '_sql', imsSqlDump_()); } catch {}
}

function imsSqlTable_(name) { return imsSqlLoad_()[name] || (imsSqlLoad_()[name] = []); }
function imsSqlGetById_(name, id) { return imsSqlTable_(name).find((r) => String(r.id) === String(id)) || null; }
function imsSqlSetById_(name, row) {
  const a = imsSqlTable_(name);
  const i = a.findIndex((r) => String(r.id) === String(row.id));
  if (i >= 0) a[i] = row; else a.push(row);
}
function imsSqlDelById_(name, id) {
  const a = imsSqlTable_(name);
  const i = a.findIndex((r) => String(r.id) === String(id));
  if (i >= 0) a.splice(i, 1);
}

// นำข้อมูลจาก store ไปใส่ STATE.* ตามสิทธิ์ของผู้ใช้ที่ล็อกอินอยู่
function imsSqlApplyToState_() {
  const db = imsSqlLoad_();
  const role = STATE.role;
  const isSuper = role === 'admin' && STATE.adminRole === 'super_admin';
  const isDept = role === 'admin' && STATE.adminRole === 'department_admin';
  const deptId = STATE.adminDepartmentId;
  const infId = STATE.currentUser && STATE.currentUser.id;
  const isActive = (c) => c && c.active !== false && c.active !== 0;

  const pinsMap = (rows) => { const o = {}; rows.forEach((r) => { o[r.influencer_id] = { pin: String(r.pin || ''), created_at: r.created_at || '', updated_at: r.updated_at || '' }; }); return o; };
  const credMap = (rows) => { const o = {}; rows.forEach((r) => { o[r.department_id] = { username: String(r.username || ''), password: String(r.password || ''), created_at: r.created_at || '', updated_at: r.updated_at || '' }; }); return o; };

  if (isSuper) {
    STATE.influencers = db.influencers.slice();
    STATE.projects = db.projects.slice();
    STATE.posts = db.posts.slice();
    STATE.departments = db.departments.slice();
    STATE.influencerPINs = pinsMap(db.influencer_pins);
    STATE.departmentCredentials = credMap(db.department_credentials);
    STATE.registrationCampaigns = db.registration_campaigns.slice();
    STATE.registrationSubmissions = db.registration_submissions.slice();
  } else if (isDept && deptId) {
    const infs = db.influencers.filter((i) => String(i.department_id) === String(deptId));
    const infIds = new Set(infs.map((i) => String(i.id)));
    STATE.influencers = infs;
    STATE.projects = db.projects.filter((p) => String(p.department_id) === String(deptId));
    STATE.posts = db.posts.filter((p) => String(p.department_id) === String(deptId));
    STATE.departments = db.departments.filter((dd) => String(dd.id) === String(deptId));
    STATE.influencerPINs = pinsMap(db.influencer_pins.filter((r) => infIds.has(String(r.influencer_id))));
    STATE.departmentCredentials = credMap(db.department_credentials.filter((r) => String(r.department_id) === String(deptId)));
    STATE.registrationCampaigns = [];
    STATE.registrationSubmissions = [];
  } else if (role === 'creator' && infId) {
    STATE.influencers = db.influencers.filter((i) => String(i.id) === String(infId));
    STATE.projects = db.projects.filter((p) => (p.assigned_influencer_ids || []).map(String).includes(String(infId)));
    STATE.posts = db.posts.filter((p) => String(p.influencer_id) === String(infId));
    STATE.departments = [];
    STATE.influencerPINs = {};
    STATE.departmentCredentials = {};
    STATE.registrationCampaigns = db.registration_campaigns.filter(isActive);
    STATE.registrationSubmissions = db.registration_submissions.filter((s) => String(s.influencer_id) === String(infId));
  } else {
    // ยังไม่ล็อกอิน — แสดงเฉพาะงานที่เปิดรับสมัคร
    STATE.registrationCampaigns = db.registration_campaigns.filter(isActive);
    STATE.registrationSubmissions = [];
  }
}

// ตัวจัดการ action ทั้งหมด (พอร์ตจาก firestoreGasAction_ แต่ทำงานบน store ใน localStorage)
async function sqlDataAction_(action, data = {}) {
  try {
    const db = imsSqlLoad_();
    const d = fbStrip_(data);
    const now = new Date().toISOString();
    const isDept = STATE.role === 'admin' && STATE.adminRole === 'department_admin' && !!STATE.adminDepartmentId;
    const dept = isDept ? String(STATE.adminDepartmentId) : '';
    const isSuper = STATE.role === 'admin' && STATE.adminRole === 'super_admin';
    const projectDeptId_ = (projectId) => { const p = imsSqlGetById_('projects', projectId); return (p && p.department_id) ? p.department_id : ''; };
    const inferDeptIdFromAssigned_ = (assigned) => {
      const ids = (Array.isArray(assigned) ? assigned : []).map((a) => String(a && a.id || '')).filter(Boolean);
      const deps = ids.map((id) => { const inf = imsSqlGetById_('influencers', id); return inf ? String(inf.department_id || '') : ''; }).filter(Boolean);
      if (!deps.length) return '';
      const first = deps[0];
      return deps.every((x) => x === first) ? first : '';
    };
    const done = (res) => { imsSqlSave_(); imsSqlApplyToState_(); return res; };

    if (action === 'getInfluencers') return { success: true, data: db.influencers.slice() };
    if (action === 'createInfluencer') {
      const id = d.id || ('inf_' + Date.now());
      const row = {
        id, name: d.name || '', phone: d.phone || '', line: d.line || '', email: d.email || '',
        national_id: d.national_id || '', url_tiktok: d.url_tiktok || '', url_shopee: d.url_shopee || '',
        url_facebook: d.url_facebook || '', url_instagram: d.url_instagram || '', url_lemon9: d.url_lemon9 || '',
        department_id: isDept ? dept : (d.department_id || ''),
        platforms: Array.isArray(d.platforms) ? d.platforms : [],
        notes: d.notes || '', created_at: d.created_at || now, updated_at: d.updated_at || ''
      };
      imsSqlSetById_('influencers', row);
      return done({ success: true, data: row });
    }
    if (action === 'updateInfluencer') {
      if (!d.id) return { success: false, error: 'Missing id' };
      const prev = imsSqlGetById_('influencers', d.id);
      if (!prev) return { success: false, error: 'Not found' };
      const merged = { ...prev, ...d, department_id: isDept ? dept : (d.department_id ?? prev.department_id ?? ''), updated_at: now };
      imsSqlSetById_('influencers', merged);
      return done({ success: true, data: merged });
    }
    if (action === 'deleteInfluencer') {
      if (!d.id) return { success: false, error: 'Missing id' };
      imsSqlDelById_('influencers', d.id);
      return done({ success: true });
    }

    if (action === 'getProjects') return { success: true, data: db.projects.slice() };
    if (action === 'createProject') {
      const id = d.id || ('proj_' + Date.now());
      const assigned = Array.isArray(d.assigned_influencers) ? d.assigned_influencers : [];
      const assigned_influencer_ids = assigned.map((a) => a.id).filter(Boolean);
      const inferredDept = (isSuper && !d.department_id) ? inferDeptIdFromAssigned_(assigned) : '';
      const row = {
        id, name: d.name || '', brand: d.brand || '',
        budget: d.budget !== undefined && d.budget !== '' ? Number(d.budget) : '',
        start_date: d.start_date || '', end_date: d.end_date || '',
        department_id: isDept ? dept : (d.department_id || inferredDept || ''),
        clip_count: d.clip_count !== undefined ? d.clip_count : 0,
        deadline: d.deadline || '', quality: d.quality || '',
        assigned_influencers: assigned, assigned_influencer_ids,
        created_at: d.created_at || now, updated_at: d.updated_at || ''
      };
      imsSqlSetById_('projects', row);
      return done({ success: true, data: row });
    }
    if (action === 'updateProject') {
      if (!d.id) return { success: false, error: 'Missing id' };
      const cur = imsSqlGetById_('projects', d.id);
      if (!cur) return { success: false, error: 'Not found' };
      const assigned = Array.isArray(d.assigned_influencers) ? d.assigned_influencers : (cur.assigned_influencers || []);
      const assigned_influencer_ids = assigned.map((a) => a.id).filter(Boolean);
      const inferredDept = (isSuper && (d.department_id === undefined || d.department_id === null || d.department_id === '')) ? inferDeptIdFromAssigned_(assigned) : '';
      const nextDept = isDept ? dept : (d.department_id ?? cur.department_id ?? inferredDept ?? '');
      const merged = { ...cur, ...d, department_id: nextDept, assigned_influencers: assigned, assigned_influencer_ids, updated_at: now };
      imsSqlSetById_('projects', merged);
      return done({ success: true, data: merged });
    }
    if (action === 'deleteProject') {
      if (!d.id) return { success: false, error: 'Missing id' };
      imsSqlDelById_('projects', d.id);
      return done({ success: true });
    }

    if (action === 'getPosts') return { success: true, data: db.posts.slice() };
    if (action === 'createPost') {
      const id = d.id || ('post_' + Date.now());
      const department_id = isDept ? dept : (d.department_id || projectDeptId_(d.project_id) || '');
      const row = {
        id, influencer_id: d.influencer_id, project_id: d.project_id || '',
        platform: d.platform, link: d.link, work_name: d.work_name || '', category: d.category || '',
        sold_date: d.sold_date || '',
        sold_amount: d.sold_amount !== undefined && d.sold_amount !== '' ? Number(d.sold_amount) : '',
        commission_amount: d.commission_amount !== undefined && d.commission_amount !== '' ? Number(d.commission_amount) : '',
        status: d.status || 'pending', rejection_reason: d.rejection_reason || '',
        created_at: d.created_at || now, updated_at: d.updated_at || '', department_id
      };
      imsSqlSetById_('posts', row);
      return done({ success: true, data: row });
    }
    if (action === 'updatePost') {
      if (!d.id) return { success: false, error: 'Missing id' };
      const cur = imsSqlGetById_('posts', d.id);
      if (!cur) return { success: false, error: 'Not found' };
      const department_id = isDept ? dept : (d.department_id || cur.department_id || projectDeptId_(d.project_id || cur.project_id) || '');
      const merged = { ...cur, ...d, department_id, updated_at: now };
      imsSqlSetById_('posts', merged);
      return done({ success: true, data: merged });
    }
    if (action === 'deletePost') {
      if (!d.id) return { success: false, error: 'Missing id' };
      imsSqlDelById_('posts', d.id);
      return done({ success: true });
    }

    if (action === 'getDepartments') return { success: true, data: db.departments.slice() };
    if (action === 'createDepartment') {
      const id = d.id || ('dept_' + Date.now());
      const row = {
        id, name: d.name || '', head: d.head || '', description: d.description || '',
        member_ids: Array.isArray(d.member_ids) ? d.member_ids : [],
        created_at: d.created_at || now, updated_at: d.updated_at || ''
      };
      imsSqlSetById_('departments', row);
      if (isSuper) {
        (row.member_ids || []).filter(Boolean).map(String).forEach((infId) => {
          const inf = imsSqlGetById_('influencers', infId);
          if (inf) imsSqlSetById_('influencers', { ...inf, department_id: id, updated_at: now });
        });
      }
      return done({ success: true, data: row });
    }
    if (action === 'updateDepartment') {
      if (!d.id) return { success: false, error: 'Missing id' };
      const prevObj = imsSqlGetById_('departments', d.id);
      if (!prevObj) return { success: false, error: 'Not found' };
      const merged = { ...prevObj, ...d, updated_at: now };
      imsSqlSetById_('departments', merged);
      if (isSuper) {
        const before = Array.isArray(prevObj.member_ids) ? prevObj.member_ids.filter(Boolean).map(String) : [];
        const after = Array.isArray(merged.member_ids) ? merged.member_ids.filter(Boolean).map(String) : [];
        const beforeSet = new Set(before), afterSet = new Set(after);
        after.filter((x) => !beforeSet.has(x)).forEach((infId) => { const inf = imsSqlGetById_('influencers', infId); if (inf) imsSqlSetById_('influencers', { ...inf, department_id: merged.id, updated_at: now }); });
        before.filter((x) => !afterSet.has(x)).forEach((infId) => { const inf = imsSqlGetById_('influencers', infId); if (inf) imsSqlSetById_('influencers', { ...inf, department_id: '', updated_at: now }); });
      }
      return done({ success: true, data: merged });
    }
    if (action === 'deleteDepartment') {
      if (!d.id) return { success: false, error: 'Missing id' };
      imsSqlDelById_('departments', d.id);
      return done({ success: true });
    }

    if (action === 'getInfluencerPINs') {
      const o = {}; db.influencer_pins.forEach((x) => { o[x.influencer_id] = { pin: String(x.pin || ''), created_at: x.created_at || '', updated_at: x.updated_at || '' }; });
      return { success: true, data: o };
    }
    if (action === 'setInfluencerPIN') {
      const infId = d.influencer_id;
      if (!infId || d.pin === undefined || d.pin === null) return { success: false, error: 'Missing pin' };
      const arr = db.influencer_pins;
      const i = arr.findIndex((r) => String(r.influencer_id) === String(infId));
      const row = { influencer_id: String(infId), pin: String(d.pin), created_at: d.created_at || (i >= 0 ? arr[i].created_at : now), updated_at: d.updated_at || now };
      if (i >= 0) arr[i] = row; else arr.push(row);
      return done({ success: true, data: row });
    }

    if (action === 'getDepartmentCredentials') {
      const o = {}; db.department_credentials.forEach((x) => { o[x.department_id] = { username: String(x.username || ''), password: String(x.password || ''), created_at: x.created_at || '', updated_at: x.updated_at || '' }; });
      return { success: true, data: o };
    }
    if (action === 'setDepartmentCredentials') {
      const deptId = d.department_id;
      if (!deptId || !d.username || !d.password) return { success: false, error: 'Missing fields' };
      const arr = db.department_credentials;
      const i = arr.findIndex((r) => String(r.department_id) === String(deptId));
      const row = { department_id: String(deptId), username: String(d.username), password: String(d.password), created_at: d.created_at || (i >= 0 ? arr[i].created_at : now), updated_at: d.updated_at || now };
      if (i >= 0) arr[i] = row; else arr.push(row);
      return done({ success: true, data: row });
    }

    if (action === 'createRegistrationCampaign') {
      if (!isSuper) return { success: false, error: 'Super admin only' };
      const id = d.id || ('regcamp_' + Date.now());
      const row = {
        id, title: String(d.title || '').trim(), description: String(d.description || '').trim(),
        image_url: String(d.image_url || ''),
        linked_project_ids: Array.isArray(d.linked_project_ids) ? d.linked_project_ids.map(String) : [],
        active: d.active !== false, created_at: d.created_at || now, updated_at: d.updated_at || ''
      };
      if (!row.title) return { success: false, error: 'กรุณาระบุชื่อการลงทะเบียน' };
      imsSqlSetById_('registration_campaigns', row);
      return done({ success: true, data: row });
    }
    if (action === 'updateRegistrationCampaign') {
      if (!isSuper) return { success: false, error: 'Super admin only' };
      if (!d.id) return { success: false, error: 'Missing id' };
      const cur = imsSqlGetById_('registration_campaigns', d.id);
      if (!cur) return { success: false, error: 'Not found' };
      const merged = {
        ...cur, ...d,
        title: String(d.title ?? cur.title ?? '').trim(),
        description: String(d.description ?? cur.description ?? '').trim(),
        image_url: d.image_url !== undefined ? String(d.image_url || '') : String(cur.image_url || ''),
        linked_project_ids: Array.isArray(d.linked_project_ids) ? d.linked_project_ids.map(String) : (cur.linked_project_ids || []),
        active: d.active !== undefined ? !!d.active : !!cur.active, updated_at: now
      };
      if (!merged.title) return { success: false, error: 'กรุณาระบุชื่อการลงทะเบียน' };
      imsSqlSetById_('registration_campaigns', merged);
      return done({ success: true, data: merged });
    }
    if (action === 'deleteRegistrationCampaign') {
      if (!isSuper) return { success: false, error: 'Super admin only' };
      if (!d.id) return { success: false, error: 'Missing id' };
      imsSqlDelById_('registration_campaigns', d.id);
      db.registration_submissions = db.registration_submissions.filter((s) => String(s.campaign_id) !== String(d.id));
      return done({ success: true });
    }
    if (action === 'createRegistrationSubmission') {
      if (STATE.role !== 'creator') return { success: false, error: 'Creator only' };
      const infId = String(d.influencer_id || (STATE.currentUser && STATE.currentUser.id) || '');
      const campaignId = String(d.campaign_id || '');
      if (!infId || !campaignId) return { success: false, error: 'Missing fields' };
      const name = String(d.name || '').trim(), phone = String(d.phone || '').trim(), line = String(d.line || '').trim();
      if (!name) return { success: false, error: 'กรุณากรอกชื่อ' };
      const camp = imsSqlGetById_('registration_campaigns', campaignId);
      if (!camp || camp.active === false || camp.active === 0) return { success: false, error: 'การลงทะเบียนนี้ปิดรับแล้ว' };
      const dup = db.registration_submissions.find((s) => String(s.campaign_id) === campaignId && String(s.influencer_id) === infId);
      if (dup) {
        const st = String(dup.status || 'pending');
        if (st === 'pending') return { success: false, error: 'คุณส่งใบสมัครแล้ว รอแอดมินอนุมัติ' };
        if (st === 'approved') return { success: false, error: 'คุณได้รับการอนุมัติแล้ว' };
      }
      const id = d.id || ('regsub_' + Date.now());
      const row = { id, campaign_id: campaignId, influencer_id: infId, name, phone, line, status: 'pending', created_at: d.created_at || now, reviewed_at: '', review_note: '' };
      imsSqlSetById_('registration_submissions', row);
      const inf = imsSqlGetById_('influencers', infId);
      if (inf) imsSqlSetById_('influencers', { ...inf, name, phone, line, updated_at: now });
      return done({ success: true, data: row });
    }
    if (action === 'reviewRegistrationSubmission') {
      if (!isSuper) return { success: false, error: 'Super admin only' };
      const subId = String(d.id || ''), status = String(d.status || '');
      if (!subId || !['approved', 'rejected'].includes(status)) return { success: false, error: 'Invalid review' };
      const sub = imsSqlGetById_('registration_submissions', subId);
      if (!sub) return { success: false, error: 'Not found' };
      if (sub.status !== 'pending') return { success: false, error: 'ใบสมัครนี้ถูกพิจารณาแล้ว' };
      imsSqlSetById_('registration_submissions', { ...sub, status, reviewed_at: now, review_note: String(d.review_note || ''), updated_at: now });
      if (status === 'approved') {
        const camp = imsSqlGetById_('registration_campaigns', String(sub.campaign_id));
        const linked = camp ? (camp.linked_project_ids || []) : [];
        const clipDefault = Math.max(1, parseInt(d.clip_count, 10) || 1);
        linked.forEach((projectId) => {
          const cur = imsSqlGetById_('projects', String(projectId));
          if (!cur) return;
          const assigned = Array.isArray(cur.assigned_influencers) ? [...cur.assigned_influencers] : [];
          if (!assigned.some((a) => String(a.id) === String(sub.influencer_id))) assigned.push({ id: String(sub.influencer_id), clip_count: clipDefault });
          imsSqlSetById_('projects', { ...cur, assigned_influencers: assigned, assigned_influencer_ids: assigned.map((a) => a.id).filter(Boolean), updated_at: now });
        });
        const inf = imsSqlGetById_('influencers', String(sub.influencer_id));
        if (inf) imsSqlSetById_('influencers', { ...inf, name: sub.name || '', phone: sub.phone || '', line: sub.line || '', updated_at: now });
      }
      return done({ success: true, data: { id: subId, status } });
    }

    return { success: false, error: 'Unknown action: ' + action };
  } catch (e) {
    console.error('[SQL] action', action, e);
    return { success: false, error: e.message || String(e) };
  }
}

// ---------- export / import ไฟล์ database.sql ----------
function imsSqlEsc_(s) { return "'" + String(s).replace(/\\/g, '\\\\').replace(/'/g, "''") + "'"; }
function imsSqlCellToSql_(table, col, val) {
  if ((IMS_SQL.JSON_COLS[table] || []).includes(col)) return imsSqlEsc_(JSON.stringify(Array.isArray(val) ? val : (val || [])));
  if (table === 'registration_campaigns' && col === 'active') return (val === false || val === 0) ? '0' : '1';
  if (val === null || val === undefined) return "''";
  return imsSqlEsc_(val);
}
// โครงสร้างตารางแบบ MySQL / MariaDB (PK = VARCHAR, active = TINYINT, array = JSON, utf8mb4)
function imsSqlSchemaText_() {
  const P = IMS_SQL.PREFIX;
  return `SET NAMES utf8mb4;

CREATE TABLE IF NOT EXISTS ${P}admins (
  username VARCHAR(64) PRIMARY KEY, password VARCHAR(255), role VARCHAR(32), created_at VARCHAR(40)
) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

CREATE TABLE IF NOT EXISTS ${P}influencers (
  id VARCHAR(64) PRIMARY KEY, name VARCHAR(255), phone VARCHAR(64), line VARCHAR(128), email VARCHAR(255),
  national_id VARCHAR(32), url_tiktok VARCHAR(512), url_shopee VARCHAR(512), url_facebook VARCHAR(512),
  url_instagram VARCHAR(512), url_lemon9 VARCHAR(512), department_id VARCHAR(64), platforms JSON, notes TEXT,
  created_at VARCHAR(40), updated_at VARCHAR(40)
) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

CREATE TABLE IF NOT EXISTS ${P}influencer_pins (
  influencer_id VARCHAR(64) PRIMARY KEY, pin VARCHAR(16), created_at VARCHAR(40), updated_at VARCHAR(40)
) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

CREATE TABLE IF NOT EXISTS ${P}departments (
  id VARCHAR(64) PRIMARY KEY, name VARCHAR(255), head VARCHAR(255), description TEXT, member_ids JSON,
  created_at VARCHAR(40), updated_at VARCHAR(40)
) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

CREATE TABLE IF NOT EXISTS ${P}department_credentials (
  department_id VARCHAR(64) PRIMARY KEY, username VARCHAR(64), password VARCHAR(255),
  created_at VARCHAR(40), updated_at VARCHAR(40)
) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

CREATE TABLE IF NOT EXISTS ${P}projects (
  id VARCHAR(64) PRIMARY KEY, name VARCHAR(255), brand VARCHAR(255), budget VARCHAR(64), start_date VARCHAR(40),
  end_date VARCHAR(40), department_id VARCHAR(64), clip_count VARCHAR(32), deadline VARCHAR(64), quality VARCHAR(64),
  assigned_influencers JSON, assigned_influencer_ids JSON, created_at VARCHAR(40), updated_at VARCHAR(40)
) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

CREATE TABLE IF NOT EXISTS ${P}posts (
  id VARCHAR(64) PRIMARY KEY, influencer_id VARCHAR(64), project_id VARCHAR(64), platform VARCHAR(32), link TEXT,
  work_name VARCHAR(255), category VARCHAR(128), sold_date VARCHAR(40), sold_amount VARCHAR(64),
  commission_amount VARCHAR(64), status VARCHAR(32), rejection_reason TEXT, created_at VARCHAR(40),
  updated_at VARCHAR(40), department_id VARCHAR(64)
) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

CREATE TABLE IF NOT EXISTS ${P}registration_campaigns (
  id VARCHAR(64) PRIMARY KEY, title VARCHAR(255), description TEXT, image_url TEXT, linked_project_ids JSON,

function imsSqlDump_() {
  const db = imsSqlLoad_();
  let out = '-- Xstream Solution — database.sql (MySQL / MariaDB) — auto-generated\n-- อัปเดตล่าสุด: ' + new Date().toISOString() + '\n\n';
  out += imsSqlSchemaText_() + '\n\n';
  IMS_SQL.TABLES.forEach((t) => {
    const cols = IMS_SQL.COLS[t];
    const rows = db[t] || [];
    if (!rows.length) { out += '-- ' + t + ': (ไม่มีข้อมูล)\n'; return; }
    rows.forEach((r) => {
      const vals = cols.map((c) => imsSqlCellToSql_(t, c, r[c]));
      out += `INSERT INTO ${IMS_SQL.PREFIX}${t} (${cols.join(', ')}) VALUES (${vals.join(', ')});\n`;
    });
    out += '\n';
  });
  return out;
}

// parser: อ่านเฉพาะ INSERT INTO ... VALUES (...);  (รองรับ '' escape และ newline ในค่า)
function imsSqlParse_(text) {
  const fresh = imsSqlDefault_();
  fresh.admins = []; // เริ่มจากว่าง แล้วเติมตามไฟล์ (ถ้าไม่มี admin จะเติมทีหลัง)
  const re = /INSERT\s+INTO\s+(\w+)\s*\(([^)]*)\)\s*VALUES\s*\(/gi;
  let m;
  while ((m = re.exec(text)) !== null) {
    // ตัด prefix ออกเพื่อ map กลับเป็นชื่อตารางภายใน (รองรับทั้งไฟล์ที่มี/ไม่มี prefix)
    const table = m[1].startsWith(IMS_SQL.PREFIX) ? m[1].slice(IMS_SQL.PREFIX.length) : m[1];
    const cols = m[2].split(',').map((s) => s.trim());
    // อ่านรายการค่าโดย scan ตั้งแต่ตำแหน่งหลัง '(' จนเจอ ')' ที่อยู่นอก quote
    let i = re.lastIndex;
    const vals = [];
    let cur = '', inStr = false, started = false;
    const finalize = () => {
      let v;
      if (started) v = cur;            // ค่าที่อยู่ใน '...'
      else { const t = cur.trim(); v = (t === 'NULL') ? null : t; } // ค่าเปลือย เช่น NULL / 1 / 0
      vals.push(v);
      cur = ''; started = false;
    };
    for (; i < text.length; i++) {
      const ch = text[i];
      if (inStr) {
        if (ch === '\\') { // MySQL backslash escape
          const nx = text[i + 1];
          if (nx === 'n') cur += '\n';
          else if (nx === 't') cur += '\t';
          else if (nx === 'r') cur += '\r';
          else if (nx === '0') cur += '\0';
          else cur += (nx === undefined ? '' : nx);
          i++;
        } else if (ch === "'") {
          if (text[i + 1] === "'") { cur += "'"; i++; }
          else { inStr = false; }
        } else cur += ch;
      } else {
        if (ch === "'") { inStr = true; started = true; cur = ''; } // เริ่ม string — ทิ้ง whitespace นำหน้า
        else if (ch === ' ' || ch === '\t' || ch === '\n' || ch === '\r') { /* ข้าม whitespace นอก string */ }
        else if (ch === ',') { finalize(); }
        else if (ch === ')') { finalize(); break; }
        else cur += ch;
      }
    }
    re.lastIndex = i;
    if (!Array.isArray(fresh[table])) continue;
    const row = {};
    cols.forEach((c, idx) => {
      let v = vals[idx];
      if ((IMS_SQL.JSON_COLS[table] || []).includes(c)) { try { v = JSON.parse(v); } catch { v = []; } }
      else if (table === 'registration_campaigns' && c === 'active') { v = !(String(v).trim() === '0' || String(v).trim().toLowerCase() === 'false'); }
      row[c] = v == null ? '' : v;
    });
    fresh[table].push(row);
  }
  if (!fresh.admins.length) fresh.admins = imsSqlDefault_().admins;
  return fresh;
}

function imsExportSqlFile() {
  try {
    const text = imsSqlDump_();
    const blob = new Blob([text], { type: 'text/sql;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'database.sql';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    if (typeof Swal !== 'undefined') Swal.fire({ icon: 'success', title: 'ดาวน์โหลด database.sql แล้ว', timer: 1400, showConfirmButton: false });
  } catch (e) {
    if (typeof Swal !== 'undefined') Swal.fire({ icon: 'error', title: 'ดาวน์โหลดไม่สำเร็จ', text: e.message || String(e) });
  }
}

function imsImportSqlFile() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.sql,text/sql,text/plain';
  input.onchange = () => {
    const file = input.files && input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const parsed = imsSqlParse_(String(reader.result || ''));
        IMS_SQL.db = parsed;
        imsSqlSave_();
        imsSqlApplyToState_();
        render();
        Swal.fire({ icon: 'success', title: 'นำเข้า database.sql สำเร็จ', timer: 1600, showConfirmButton: false });
      } catch (e) {
        Swal.fire({ icon: 'error', title: 'นำเข้าไม่สำเร็จ', text: e.message || String(e) });
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

const REALTIME = {
  enabled: true,
  intervalMs: 6000,
  _timer: null,
  _bc: null,
  _lastPullAt: 0,
  _lastDataHash: ''
};

// ---------- Firebase Firestore (optional: firebase-config.js + deploy firestore.rules) ----------
let _fbUnsubs = [];
let _fbRenderScheduled = false;
let _fbBootstrapped = {
  influencers: false,
  departments: false,
  influencer_pins: false,
  department_credentials: false
};
/** โหมด production + Cloud Functions: ไม่ subscribe ชุด login แบบ anonymous (กฎ Firestore จะบล็อก) */
let _fbCreatorDocSnapDone = false;
let _fbDeptDocSnapDone = false;
let _fbDeptDynamicUnsubs = [];
let _fbDeptPinsUnsubs = [];
let _fbDeptPinsKey = '';
let _fbDeptPinsAllowed = new Set();

function imsSkipAnonymousFirestoreBootstrap_() {
  return imsClientUsesCallableAuth_();
}

function isFirestoreReadyForLogin_() {
  if (!window._imsDb) return false;
  if (imsSkipAnonymousFirestoreBootstrap_()) return true;
  return !!(_fbBootstrapped.influencers && _fbBootstrapped.influencer_pins && _fbBootstrapped.departments && _fbBootstrapped.department_credentials);
}

function fbTs_(v) {
  if (v && typeof v.toDate === 'function') return v.toDate().toISOString();
  if (v && typeof v.seconds === 'number') return new Date(v.seconds * 1000).toISOString();
  return v === undefined || v === null ? '' : String(v);
}

function fbDocData_(doc) {
  const d = doc.data() || {};
  const o = { id: doc.id, ...d };
  ['created_at', 'updated_at', 'deadline', 'start_date', 'end_date'].forEach((k) => {
    if (o[k] != null && typeof o[k] !== 'string') o[k] = fbTs_(o[k]);
  });
  return o;
}

let _imsBootTimer = null;
function setBooting_(on) {
  try {
    const next = !!on;
    if (STATE.booting === next) return;
    STATE.booting = next;
    if (_imsBootTimer) { try { clearTimeout(_imsBootTimer); } catch {} _imsBootTimer = null; }
    if (next) {
      STATE._bootingSince = Date.now();
      // Safety: never get stuck on boot screen
      _imsBootTimer = setTimeout(() => {
        STATE.booting = false;
        try { render(); } catch {}
      }, 5500);
    } else {
      STATE._bootingSince = null;
    }
  } catch {}
}

function imsAcceptSnapshot_(snap) {
  // During booting, ignore cached snapshots so UI doesn't flash stale data on reload.
  try {
    if (!STATE.booting) return true;
    const fromCache = !!snap?.metadata?.fromCache;
    if (!fromCache) return true;
    const since = Number(STATE._bootingSince || 0);
    // After a short grace period, accept cache to avoid getting stuck.
    if (since && (Date.now() - since) > 4500) return true;
    return false;
  } catch { return true; }
}

function stopFirestoreRealtime_() {
  (_fbUnsubs || []).forEach((fn) => { try { fn(); } catch {} });
  _fbUnsubs = [];
  _fbCreatorDocSnapDone = false;
  _fbDeptDocSnapDone = false;
  (_fbDeptDynamicUnsubs || []).forEach((fn) => { try { fn(); } catch {} });
  _fbDeptDynamicUnsubs = [];
  (_fbDeptPinsUnsubs || []).forEach((fn) => { try { fn(); } catch {} });
  _fbDeptPinsUnsubs = [];
  _fbDeptPinsKey = '';
  _fbDeptPinsAllowed = new Set();
}

function scheduleFirestoreRender_() {
  refreshCurrentUserFromInfluencers_();
  validateRestoredAdminSession_();
  const h = hashRealtimeData_();
  if (h === REALTIME._lastDataHash) return;
  REALTIME._lastDataHash = h;
  if (_fbRenderScheduled) return;
  _fbRenderScheduled = true;
  requestAnimationFrame(() => {
    _fbRenderScheduled = false;
    if (STATE.booting) setBooting_(false);
    // อย่า re-render ทั้งหน้าขณะเปิด modal — มักทำให้กดปุ่มแก้ไข/ลบ/PIN ไม่ทัน
    if (STATE.modalOpen) return;
    render();
  });
}

function startFirestoreRealtime_() {
  if (!window._imsDb) return;
  stopFirestoreRealtime_();
  const db = window._imsDb;
  const onErr = (c, e) => console.error('[Firestore]', c, e);
  const needLoginBootstrap = !imsSkipAnonymousFirestoreBootstrap_();

  // Emulator / legacy: subscribe ชุดข้อมูลสำหรับเช็ค PIN & รหัสแผนกบน client
  if (needLoginBootstrap) {
    _fbUnsubs.push(db.collection('influencers').onSnapshot((snap) => {
      STATE.influencers = snap.docs.map(fbDocData_);
      _fbBootstrapped.influencers = true;
      scheduleFirestoreRender_();
    }, (e) => onErr('influencers', e)));

    _fbUnsubs.push(db.collection('departments').onSnapshot((snap) => {
      STATE.departments = snap.docs.map(fbDocData_);
      _fbBootstrapped.departments = true;
      scheduleFirestoreRender_();
    }, (e) => onErr('departments', e)));

    _fbUnsubs.push(db.collection('influencer_pins').onSnapshot((snap) => {
      const o = {};
      snap.docs.forEach((doc) => {
        const x = doc.data() || {};
        o[doc.id] = { pin: String(x.pin || ''), created_at: fbTs_(x.created_at), updated_at: fbTs_(x.updated_at) };
      });
      STATE.influencerPINs = o;
      _fbBootstrapped.influencer_pins = true;
      scheduleFirestoreRender_();
    }, (e) => onErr('influencer_pins', e)));

    _fbUnsubs.push(db.collection('department_credentials').onSnapshot((snap) => {
      const o = {};
      snap.docs.forEach((doc) => {
        const x = doc.data() || {};
        o[doc.id] = {
          username: String(x.username || ''),
          password: String(x.password || ''),
          created_at: fbTs_(x.created_at),
          updated_at: fbTs_(x.updated_at)
        };
      });
      STATE.departmentCredentials = o;
      _fbBootstrapped.department_credentials = true;
      scheduleFirestoreRender_();
    }, (e) => onErr('department_credentials', e)));

    _fbUnsubs.push(db.collection('registration_campaigns').onSnapshot((snap) => {
      STATE.registrationCampaigns = snap.docs.map(fbDocData_);
      scheduleFirestoreRender_();
    }, (e) => onErr('registration_campaigns(bootstrap)', e)));
  }

  // ยังไม่ล็อกอิน — โหลดเฉพาะงานลงทะเบียนที่เปิดรับ (หน้า Creator Access)
  if (!STATE.role) {
    if (imsSkipAnonymousFirestoreBootstrap_()) {
      _fbUnsubs.push(
        db.collection('registration_campaigns').where('active', '==', true)
          .onSnapshot((snap) => {
            STATE.registrationCampaigns = snap.docs.map(fbDocData_);
            scheduleFirestoreRender_();
          }, (e) => onErr('registration_campaigns(public)', e))
      );
    }
    return;
  }

  if (STATE.role === 'admin') {
    if (STATE.adminRole === 'super_admin') {
      if (imsSkipAnonymousFirestoreBootstrap_()) {
        _fbUnsubs.push(db.collection('influencers').onSnapshot((snap) => {
          STATE.influencers = snap.docs.map(fbDocData_);
          scheduleFirestoreRender_();
        }, (e) => onErr('influencers', e)));
        _fbUnsubs.push(db.collection('departments').onSnapshot((snap) => {
          STATE.departments = snap.docs.map(fbDocData_);
          scheduleFirestoreRender_();
        }, (e) => onErr('departments', e)));
        _fbUnsubs.push(db.collection('influencer_pins').onSnapshot((snap) => {
          const o = {};
          snap.docs.forEach((doc) => {
            const x = doc.data() || {};
            o[doc.id] = { pin: String(x.pin || ''), created_at: fbTs_(x.created_at), updated_at: fbTs_(x.updated_at) };
          });
          STATE.influencerPINs = o;
          scheduleFirestoreRender_();
        }, (e) => onErr('influencer_pins', e)));
        _fbUnsubs.push(db.collection('department_credentials').onSnapshot((snap) => {
          const o = {};
          snap.docs.forEach((doc) => {
            const x = doc.data() || {};
            o[doc.id] = {
              username: String(x.username || ''),
              password: String(x.password || ''),
              created_at: fbTs_(x.created_at),
              updated_at: fbTs_(x.updated_at)
            };
          });
          STATE.departmentCredentials = o;
          scheduleFirestoreRender_();
        }, (e) => onErr('department_credentials', e)));

      }

      _fbUnsubs.push(db.collection('projects').onSnapshot((snap) => {
        STATE.projects = snap.docs.map(fbDocData_);
        scheduleFirestoreRender_();
      }, (e) => onErr('projects', e)));

      _fbUnsubs.push(db.collection('posts').onSnapshot((snap) => {
        STATE.posts = snap.docs.map(fbDocData_);
        scheduleFirestoreRender_();
      }, (e) => onErr('posts', e)));

      _fbUnsubs.push(db.collection('registration_campaigns').onSnapshot((snap) => {
        STATE.registrationCampaigns = snap.docs.map(fbDocData_);
        scheduleFirestoreRender_();
      }, (e) => onErr('registration_campaigns', e)));

      _fbUnsubs.push(db.collection('registration_submissions').onSnapshot((snap) => {
        STATE.registrationSubmissions = snap.docs.map(fbDocData_);
        scheduleFirestoreRender_();
      }, (e) => onErr('registration_submissions', e)));
      return;
    }

    if (STATE.adminRole === 'department_admin' && STATE.adminDepartmentId) {
      const deptId = STATE.adminDepartmentId;
      const mergeById = (a, b) => {
        const m = new Map();
        (a || []).forEach((x) => { if (x && x.id) m.set(String(x.id), x); });
        (b || []).forEach((x) => { if (x && x.id) m.set(String(x.id), x); });
        return Array.from(m.values());
      };

      if (imsSkipAnonymousFirestoreBootstrap_()) {
        // Reset to prevent showing stale data from previous role/session.
        STATE.influencers = [];
        STATE.projects = [];
        STATE.posts = [];
        STATE.departments = [];
        STATE.influencerPINs = {};

        const FieldPath = firebase?.firestore?.FieldPath;
        const docIdPath = FieldPath ? FieldPath.documentId() : null;
        const chunk10 = (arr) => {
          const a = Array.isArray(arr) ? arr.filter(Boolean).map(String) : [];
          const out = [];
          for (let i = 0; i < a.length; i += 10) out.push(a.slice(i, i + 10));
          return out;
        };

        const rebuildDeptPinsListeners_ = (ids) => {
          if (!docIdPath) return;
          const uniq = Array.from(new Set((ids || []).filter(Boolean).map(String)));
          uniq.sort();
          const key = uniq.join(',');
          if (key === _fbDeptPinsKey) return;
          _fbDeptPinsKey = key;

          (_fbDeptPinsUnsubs || []).forEach((fn) => { try { fn(); } catch {} });
          _fbDeptPinsUnsubs = [];
          _fbDeptPinsAllowed = new Set(uniq);

          // prune pins not in this dept (prevents showing stale pins)
          try {
            const cur = { ...(STATE.influencerPINs || {}) };
            Object.keys(cur).forEach((k) => { if (!_fbDeptPinsAllowed.has(String(k))) delete cur[k]; });
            STATE.influencerPINs = cur;
          } catch {}

          const chunks = chunk10(uniq);
          chunks.forEach((c, idx) => {
            _fbDeptPinsUnsubs.push(
              db.collection('influencer_pins').where(docIdPath, 'in', c).onSnapshot((s2) => {
                const o = { ...(STATE.influencerPINs || {}) };
                s2.docs.forEach((doc) => {
                  const x = doc.data() || {};
                  if (!_fbDeptPinsAllowed.has(String(doc.id))) return;
                  o[doc.id] = { pin: String(x.pin || ''), created_at: fbTs_(x.created_at), updated_at: fbTs_(x.updated_at) };
                });
                STATE.influencerPINs = o;
                scheduleFirestoreRender_();
              }, (e) => onErr('influencer_pins(dept#' + idx + ')', e))
            );
          });
        };
        _fbUnsubs.push(db.collection('departments').doc(deptId).onSnapshot((snap) => {
          STATE.departments = snap.exists ? [fbDocData_(snap)] : [];
          _fbDeptDocSnapDone = true;
          if (snap.exists) {
            try {
              const d0 = snap.data() || {};
              STATE.adminDepartmentName = String(d0.name || '') || STATE.adminDepartmentName || '';
            } catch {}
          }

          scheduleFirestoreRender_();

          // Legacy membership fallback: listen by departments.member_ids if present.
          (_fbDeptDynamicUnsubs || []).forEach((fn) => { try { fn(); } catch {} });
          _fbDeptDynamicUnsubs = [];
          const memberIds = snap.exists ? (snap.data()?.member_ids || []) : [];
          const chunks = chunk10(memberIds);

          if (docIdPath && chunks.length) {
            // Influencers: docId in member_ids (in chunks)
            chunks.forEach((c, idx) => {
              _fbDeptDynamicUnsubs.push(
                db.collection('influencers').where(docIdPath, 'in', c).onSnapshot((s2) => {
                  const next = s2.docs.map(fbDocData_);
                  STATE.influencers = mergeById(STATE.influencers, next);
                  scheduleFirestoreRender_();
                }, (e) => onErr('influencers(member_ids#' + idx + ')', e))
              );
            });

            // Influencer PINs: docId in member_ids (in chunks)
            chunks.forEach((c, idx) => {
              _fbDeptDynamicUnsubs.push(
                db.collection('influencer_pins').where(docIdPath, 'in', c).onSnapshot((s2) => {
                  const o = { ...(STATE.influencerPINs || {}) };
                  s2.docs.forEach((doc) => {
                    const x = doc.data() || {};
                    o[doc.id] = { pin: String(x.pin || ''), created_at: fbTs_(x.created_at), updated_at: fbTs_(x.updated_at) };
                  });
                  STATE.influencerPINs = o;
                  scheduleFirestoreRender_();
                }, (e) => onErr('influencer_pins(member_ids#' + idx + ')', e))
              );
            });

            // Projects: assigned_influencer_ids hasAny member_ids (in chunks)
            chunks.forEach((c, idx) => {
              _fbDeptDynamicUnsubs.push(
                db.collection('projects').where('assigned_influencer_ids', 'array-contains-any', c).onSnapshot((s2) => {
                  const next = s2.docs.map(fbDocData_);
                  STATE.projects = mergeById(STATE.projects, next);
                  scheduleFirestoreRender_();
                }, (e) => onErr('projects(member_ids#' + idx + ')', e))
              );
            });

            // Posts: influencer_id in member_ids (in chunks)
            chunks.forEach((c, idx) => {
              _fbDeptDynamicUnsubs.push(
                db.collection('posts').where('influencer_id', 'in', c).onSnapshot((s2) => {
                  const next = s2.docs.map(fbDocData_);
                  STATE.posts = mergeById(STATE.posts, next);
                  scheduleFirestoreRender_();
                }, (e) => onErr('posts(member_ids#' + idx + ')', e))
              );
            });
          }
          scheduleFirestoreRender_();
        }, (e) => onErr('departments(dept)', e)));

        _fbUnsubs.push(db.collection('department_credentials').doc(deptId).onSnapshot((snap) => {
          const o = { ...(STATE.departmentCredentials || {}) };
          if (snap.exists) {
            const x = snap.data() || {};
            o[deptId] = {
              username: String(x.username || ''),
              password: String(x.password || ''),
              created_at: fbTs_(x.created_at),
              updated_at: fbTs_(x.updated_at)
            };
          } else {
            delete o[deptId];
          }
          STATE.departmentCredentials = o;
          scheduleFirestoreRender_();
        }, (e) => onErr('department_credentials(dept)', e)));

        _fbUnsubs.push(
          db.collection('influencers').where('department_id', '==', deptId)
            .onSnapshot((snap) => {
              const next = snap.docs.map(fbDocData_);
              // Replace (not merge) so deletions disappear from UI.
              STATE.influencers = next;
              rebuildDeptPinsListeners_(next.map((x) => x?.id).filter(Boolean));
              scheduleFirestoreRender_();
            }, (e) => onErr('influencers(dept)', e))
        );
      }

      _fbUnsubs.push(
        db.collection('projects').where('department_id', '==', deptId)
          .onSnapshot((snap) => {
            const next = snap.docs.map(fbDocData_);
            // Replace (not merge) so deletions disappear from UI.
            STATE.projects = next;
            scheduleFirestoreRender_();
          }, (e) => onErr('projects(dept)', e))
      );

      _fbUnsubs.push(
        db.collection('posts').where('department_id', '==', deptId)
          .onSnapshot((snap) => {
            const next = snap.docs.map(fbDocData_);
            // Replace (not merge) so deletions disappear from UI.
            STATE.posts = next;
            scheduleFirestoreRender_();
          }, (e) => onErr('posts(dept)', e))
      );
      return;
    }
  }

  if (STATE.role === 'creator' && STATE.currentUser?.id) {
    const infId = STATE.currentUser.id;

    if (imsSkipAnonymousFirestoreBootstrap_()) {
      _fbUnsubs.push(db.collection('influencers').doc(infId).onSnapshot({ includeMetadataChanges: true }, (snap) => {
        if (!imsAcceptSnapshot_(snap)) return;
        STATE.influencers = snap.exists ? [fbDocData_(snap)] : [];
        try {
          const d0 = snap.exists ? (snap.data() || {}) : {};
          const deptId = String(d0.department_id || '');
          STATE.creatorDepartmentId = deptId || null;
          setBooting_(false);
        } catch {}
        _fbCreatorDocSnapDone = true;
        scheduleFirestoreRender_();
      }, (e) => onErr('influencers(creator)', e)));
    }

    _fbUnsubs.push(
      db.collection('projects').where('assigned_influencer_ids', 'array-contains', infId)
        .onSnapshot({ includeMetadataChanges: true }, (snap) => {
          if (!imsAcceptSnapshot_(snap)) return;
          const next = snap.docs.map(fbDocData_);
          STATE.projects = next;
          scheduleFirestoreRender_();
        }, (e) => onErr('projects(creator)', e))
    );

    _fbUnsubs.push(

function bootstrapFirebaseRealtimeAfterReload_() {
  // Fix: on some reloads, Auth restoration + session restoration timing can leave Creator UI stale
  // until a manual re-login. This forces a "soft re-login" by waiting for currentUser, refreshing
  // token/claims, restarting listeners, then re-rendering.
  try {
    if (!imsSkipAnonymousFirestoreBootstrap_()) return;
    if (!STATE.role) return;
    if (!window._imsAuth || !window._imsDb) return;
    let tries = 0;
    setBooting_(true);
    render();
    const tick = async () => {
      tries++;
      const u = window._imsAuth.currentUser;
      if (!u) {
        if (tries < 14) return setTimeout(tick, 250);
        return;
      }
      try {
        const r = await u.getIdTokenResult(true);
        STATE._authClaims = r?.claims || null;
      } catch {}
      try { startFirestoreRealtime_(); } catch {}
      try { render(); } catch {}
    };
    setTimeout(tick, 0);
  } catch {}
}

function initFirebaseAfterPing_(emuHost, emuPort) {
  try {
    if (!firebase.apps || firebase.apps.length === 0) firebase.initializeApp(window.FIREBASE_CONFIG);
    window._imsAuth = firebase.auth();
    window._imsDb = firebase.firestore();
    try {
      window._imsDb.useEmulator(emuHost, emuPort);
    } catch (emuErr) {
      if (String(emuErr).indexOf('already been called') < 0 && String(emuErr).indexOf('Cannot call') < 0) {
        console.warn('Firestore emulator:', emuErr);
      }
    }
    if (typeof console !== 'undefined' && console.info) {
      console.info('[IMS] Firestore emulator', emuHost + ':' + emuPort, '(โปรเจกต์', window.FIREBASE_CONFIG.projectId + ')');
    }
    startFirestoreRealtime_();
  } catch (e) {
    console.warn('Firebase emulator init failed:', e);
    window._imsDb = null;
  }
}

        return { success: false, error: 'การลงทะเบียนนี้ปิดรับแล้ว' };
      }
      const dup = await db.collection('registration_submissions')
        .where('campaign_id', '==', campaignId)
        .where('influencer_id', '==', infId)
        .limit(1)
        .get();
      if (!dup.empty) {
        const st = String(dup.docs[0].data()?.status || 'pending');
        if (st === 'pending') return { success: false, error: 'คุณส่งใบสมัครแล้ว รอแอดมินอนุมัติ' };
        if (st === 'approved') return { success: false, error: 'คุณได้รับการอนุมัติแล้ว' };
      }
      const id = d.id || ('regsub_' + Date.now());
      const row = {
        id,
        campaign_id: campaignId,
        influencer_id: infId,
        name,
        phone,
        line,
        status: 'pending',
        created_at: d.created_at || now,
        reviewed_at: '',
        review_note: ''
      };
      await db.collection('registration_submissions').doc(id).set(row);
      try {
        await db.collection('influencers').doc(infId).set({ name, phone, line, updated_at: now }, { merge: true });
      } catch {}
      return { success: true, data: row };
    }
    if (action === 'reviewRegistrationSubmission') {
      if (!isSuper) return { success: false, error: 'Super admin only' };
      const subId = String(d.id || '');
      const status = String(d.status || '');
      if (!subId || !['approved', 'rejected'].includes(status)) {
        return { success: false, error: 'Invalid review' };
      }
      const subRef = db.collection('registration_submissions').doc(subId);
      const subSnap = await subRef.get();
      if (!subSnap.exists) return { success: false, error: 'Not found' };
      const sub = fbDocData_(subSnap);
      if (sub.status !== 'pending') return { success: false, error: 'ใบสมัครนี้ถูกพิจารณาแล้ว' };
      await subRef.set({
        ...sub,
        status,
        reviewed_at: now,
        review_note: String(d.review_note || ''),
        updated_at: now
      });
      if (status === 'approved') {
        const campSnap = await db.collection('registration_campaigns').doc(String(sub.campaign_id)).get();
        const linked = campSnap.exists ? (campSnap.data().linked_project_ids || []) : [];
        const clipDefault = Math.max(1, parseInt(d.clip_count, 10) || 1);
        for (const projectId of linked) {
          const projRef = db.collection('projects').doc(String(projectId));
          const projSnap = await projRef.get();
          if (!projSnap.exists) continue;
          const cur = fbDocData_(projSnap);
          const assigned = Array.isArray(cur.assigned_influencers) ? [...cur.assigned_influencers] : [];
          if (!assigned.some((a) => String(a.id) === String(sub.influencer_id))) {
            assigned.push({ id: String(sub.influencer_id), clip_count: clipDefault });
          }
          const assigned_influencer_ids = assigned.map((a) => a.id).filter(Boolean);
          await projRef.set({ ...cur, assigned_influencers: assigned, assigned_influencer_ids, updated_at: now });
        }
        try {
          await db.collection('influencers').doc(String(sub.influencer_id)).set({
            name: sub.name || '',
            phone: sub.phone || '',
            line: sub.line || '',
            updated_at: now
          }, { merge: true });
        } catch {}
      }
      return { success: true, data: { id: subId, status } };
    }

    return { success: false, error: 'Unknown action: ' + action };
  } catch (e) {
    console.error('Firestore action', action, e);
    return { success: false, error: e.message || String(e) };
  }
}

function broadcastDataUpdate(reason = 'update') {
  try {
    if (REALTIME._bc) REALTIME._bc.postMessage({ type: 'data:update', reason, at: Date.now() });
  } catch {}
}

function ensureRealtime() {
  if (!REALTIME.enabled) return;
  if (REALTIME._timer) return;

  // BroadcastChannel for same-origin tabs
  try {
    REALTIME._bc = new BroadcastChannel('ims_realtime');
    REALTIME._bc.onmessage = (ev) => {
      if (ev?.data?.type === 'data:update') syncData({ silent: true });
    };
  } catch {}

  // โหมด MySQL: poll snapshot เป็นระยะ (near-realtime ข้ามผู้ใช้)
  if (imsApiMode_() && !REALTIME._timer) {
    REALTIME._timer = setInterval(() => {
      if (STATE.role && !STATE.modalOpen && !STATE.syncingData) syncData({ silent: true });
    }, REALTIME.intervalMs || 6000);
  }
}

function hashRealtimeData_() {
  // Intentionally small + stable subset; keeps UI from "refreshing" when nothing changed.
  try {
    return JSON.stringify({
      influencers: STATE.influencers || [],
      projects: STATE.projects || [],
      posts: STATE.posts || [],
      departments: STATE.departments || [],
      influencerPINs: STATE.influencerPINs || {},
      departmentCredentials: STATE.departmentCredentials || {},
      registrationCampaigns: STATE.registrationCampaigns || [],
      registrationSubmissions: STATE.registrationSubmissions || []
    });
  } catch {
    return String(Date.now());
  }
}

async function syncData(options = {}) {
  const silent = !!options.silent;
  REALTIME._lastPullAt = Date.now();
  STATE.syncingData = true;
  const beforeHash = REALTIME._lastDataHash || hashRealtimeData_();
  if (!silent) render();
  if (!silent) {
    Swal.fire({ title: 'กำลังซิงค์ข้อมูล...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
  }
  try {
    if (imsApiMode_()) {
      const before = REALTIME._lastDataHash || hashRealtimeData_();
      await imsApiSnapshot_();
      STATE.syncingData = false;
      const after = hashRealtimeData_();
      REALTIME._lastDataHash = after;
      if (!silent) Swal.fire({ icon: 'success', title: 'ซิงค์สำเร็จ!', timer: 1000, showConfirmButton: false });
      // อย่า re-render ทับ modal/ฟอร์มที่กำลังกรอกถ้าข้อมูลไม่เปลี่ยน
      if (!silent || (after !== before && !STATE.modalOpen)) render();
      return;
    }
    if (imsSqlMode_()) {
      imsSqlApplyToState_();
      if (!silent) Swal.fire({ icon: 'success', title: 'ซิงค์สำเร็จ!', timer: 1000, showConfirmButton: false });
      STATE.syncingData = false;
      const h2 = hashRealtimeData_();
      REALTIME._lastDataHash = h2;
      render();
      return;
    }
    if (!window._imsDb) {
      throw new Error('Firebase ยังไม่เชื่อมต่อ — รัน npm run dev หรือตั้ง firebase-config.local.js');
    }
    refreshCurrentUserFromInfluencers_();
    validateRestoredAdminSession_();
    if (!silent) Swal.fire({ icon: 'success', title: 'ซิงค์สำเร็จ!', timer: 1200, showConfirmButton: false });
  } catch (e) {
    if (!silent) Swal.fire({ icon: 'error', title: 'เกิดข้อผิดพลาด', text: e.message });
  }
  STATE.syncingData = false;
  const afterHash = hashRealtimeData_();
  REALTIME._lastDataHash = afterHash;
  if (!silent || afterHash !== beforeHash) render();
}

async function saveRecord(action, data, successMsg) {
  Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
  const res = await dataAction(action, data);
  if (res.success) {

}

function validateLink(platform, url) {
  if (!url || !url.trim()) return { valid: false, msg: 'กรุณาใส่ลิงก์' };
  const p = PLATFORMS.find(x => x.id === platform);
  if (!p) return { valid: false, msg: 'เลือกแพลตฟอร์ม' };
  if (!p.pattern.test(url)) return { valid: false, msg: `ลิงก์ไม่ตรงกับ ${p.name} กรุณาตรวจสอบ` };
  try { new URL(url); } catch { return { valid: false, msg: 'รูปแบบ URL ไม่ถูกต้อง' }; }
  return { valid: true };
}

function exportCurrentPageToExcel() {
  const isSuperAdmin = STATE.adminRole === 'super_admin';
  const isDeptHead = STATE.adminRole === 'department_admin';
  if (!isSuperAdmin && !isDeptHead) {
    Swal.fire({ icon: 'warning', title: 'สิทธิ์ไม่เพียงพอ' });
    return;
  }
  if (!window.XLSX) {
    Swal.fire({
      icon: 'error',
      title: 'ไม่สามารถ Export Excel ได้',
      text: 'ไม่พบไลบรารี XLSX (SheetJS) กรุณารีเฟรชหน้าแล้วลองใหม่'
    });
    return;
  }

  const now = new Date();
  const stamp = now.toISOString().slice(0, 19).replace(/[:T]/g, '-');
  const pageId = STATE.currentPage || 'admin';
  const filename = `export_${pageId}_${stamp}.xlsx`;

  const wb = XLSX.utils.book_new();

  const addSheet = (name, rows) => {
    const safeRows = Array.isArray(rows) ? rows : [];
    const ws = XLSX.utils.json_to_sheet(safeRows.length ? safeRows : [{ info: 'no data' }]);
    XLSX.utils.book_append_sheet(wb, ws, name.slice(0, 31));
  };

  if (pageId === 'admin-dashboard') {
    const filteredInfluencers = getFilteredInfluencers();
    const filteredProjects = getFilteredProjects();
    const filteredPosts = getFilteredPosts();
    const dashboardFilteredPosts = filteredPosts.filter(p => {
      const date = new Date(p.created_at);
      const matchDay = !STATE.dashboardFilterDay || date.getDate() === STATE.dashboardFilterDay;
      const matchMonth = !STATE.dashboardFilterMonth || (date.getMonth() + 1) === STATE.dashboardFilterMonth;
      const matchYear = !STATE.dashboardFilterYear || date.getFullYear() === STATE.dashboardFilterYear;
      return matchDay && matchMonth && matchYear;
    });
    const deptMembers = getDepartmentMembers();
    const kpiArray = deptMembers.map(m => ({
      influencer_id: m.id,
      name: m.name,
      phone: m.phone || '',
      kpi_posts: dashboardFilteredPosts.filter(p => p.influencer_id === m.id).length
    })).sort((a, b) => b.kpi_posts - a.kpi_posts);

    addSheet('Summary', [{
      influencers: filteredInfluencers.length,
      projects: filteredProjects.length,
      posts: dashboardFilteredPosts.length,
      departments: STATE.departments.length,
      dashboardFilterDay: STATE.dashboardFilterDay || '',
      dashboardFilterMonth: STATE.dashboardFilterMonth || '',
      dashboardFilterYear: STATE.dashboardFilterYear || '',
      dashboardFilterDept: STATE.dashboardFilterDept || ''
    }]);
    addSheet('KPI', kpiArray);
  } else if (pageId === 'admin-influencers') {
    const influencers = getFilteredInfluencers().map(i => ({
      id: i.id,
      name: i.name,
      email: i.email || '',
      national_id: i.national_id || '',
      rating: Number(i.rating) || 0,
      phone: i.phone || '',
      line: i.line || '',
      url_tiktok: i.url_tiktok || '',
      url_shopee: i.url_shopee || '',
      url_facebook: i.url_facebook || '',
      url_instagram: i.url_instagram || '',
      url_lemon9: i.url_lemon9 || '',
      pin: STATE.influencerPINs?.[i.id]?.pin || ''
    }));
    addSheet('Influencers', influencers);
  } else if (pageId === 'admin-projects') {
    const projects = getFilteredProjects();
    addSheet('Projects', projects.map(p => ({
      id: p.id,
      name: p.name,
      deadline: p.deadline || '',
      quality: p.quality || '',
      clip_count_total: p.clip_count ?? '',
      assigned_count: (p.assigned_influencers || []).length
    })));
    addSheet('Project_Assignments', projects.flatMap(p =>
      (p.assigned_influencers || []).map(a => {
        const inf = STATE.influencers.find(i => i.id === a.id);
        return {
          project_id: p.id,
          project_name: p.name,
          influencer_id: a.id,
          influencer_name: inf?.name || '',
          clip_count: a.clip_count || 0
        };
      })
    ));
  } else if (pageId === 'admin-departments') {
    const departmentsForExport = isDeptHead && STATE.adminDepartmentId
      ? STATE.departments.filter(d => d.id === STATE.adminDepartmentId)
      : STATE.departments;

    addSheet('Departments', departmentsForExport.map(d => ({
      id: d.id,
      name: d.name,
      head: d.head || '',
      description: d.description || '',
      member_ids: (d.member_ids || []).join(','),
      ...(isSuperAdmin ? {
        username: STATE.departmentCredentials?.[d.id]?.username || '',
        password: STATE.departmentCredentials?.[d.id]?.password || ''
      } : {})
    })));
  } else if (pageId === 'admin-tracking') {
    const posts = getFilteredPosts();
    const filtered = posts.filter(p => {
      const date = new Date(p.created_at);
      const matchDay = !STATE.filterDay || date.getDate() === STATE.filterDay;
      const matchMonth = !STATE.filterMonth || (date.getMonth() + 1) === STATE.filterMonth;
      const matchYear = !STATE.filterYear || date.getFullYear() === STATE.filterYear;
      const matchStatus = !STATE.filterStatus || p.status === STATE.filterStatus;
      return matchDay && matchMonth && matchYear && matchStatus;
    });
    addSheet('Tracking', filtered.map(p => {
      const inf = STATE.influencers.find(i => i.id === p.influencer_id);
      const proj = STATE.projects.find(x => x.id === p.project_id);
      const plat = PLATFORMS.find(x => x.id === p.platform);
      return {
        id: p.id,
        created_at: p.created_at || '',
        influencer_id: p.influencer_id,
        influencer_name: inf?.name || '',
        project_id: p.project_id,
        project_name: proj?.name || '',
        platform: plat?.name || p.platform || '',
        link: p.link || '',
        status: p.status || '',
        rejection_reason: p.rejection_reason || ''
      };
    }));
  } else {
    Swal.fire({ icon: 'info', title: 'หน้านี้ยังไม่รองรับ Export' });
    return;
  }

  XLSX.writeFile(wb, filename);
  Swal.fire({ icon: 'success', title: 'ดาวน์โหลดแล้ว', text: filename, timer: 1200, showConfirmButton: false });
}

/** ลิงก์จากฟอร์ม — ไม่บังคับ; เติม https:// ถ้าไม่มี scheme */
function imsNormalizeUrlInput_(t) {
  const s = String(t || '').trim();
  if (!s) return '';
  if (/^https?:\/\//i.test(s)) return s;
  if (/^\/\//.test(s)) return 'https:' + s;
  return 'https://' + s.replace(/^\/+/, '');
}

/** คืน URL ที่เปิดในแท็บได้เท่านั้น (http/https) */
function imsSafeHttpUrl_(raw) {
  const u = imsNormalizeUrlInput_(raw);
  if (!u) return '';
  try {
    const x = new URL(u);
    if (x.protocol !== 'http:' && x.protocol !== 'https:') return '';
    return x.href;
  } catch {
    return '';
  }
}

function getProjectProgress(influencerId, projectId) {
  const proj = STATE.projects.find(p => p.id === projectId);
  if (!proj) return { done: 0, total: 0 };
  const done = STATE.posts.filter(p => p.influencer_id === influencerId && p.project_id === projectId && p.status === 'completed').length;
  const assigned = (proj.assigned_influencers || []).find(a => a.id === influencerId);
  const total = assigned ? (assigned.clip_count || 0) : (proj.clip_count || 0);
  return { done, total };
}

function imsEsc_(s) {

function imsReadImageFileAsDataUrl_(file, maxW = 960, maxH = 540, quality = 0.82) {
  return new Promise((resolve, reject) => {
    if (!file || !file.type || !file.type.startsWith('image/')) { reject(new Error('กรุณาเลือกไฟล์รูปภาพ')); return; }
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('อ่านไฟล์รูปไม่สำเร็จ'));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error('โหลดรูปไม่สำเร็จ'));
      img.onload = () => {
        let w = img.width, h = img.height;
        const ratio = Math.min(maxW / w, maxH / h, 1);
        w = Math.round(w * ratio); h = Math.round(h * ratio);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL('image/jpeg', quality);
        if (dataUrl.length > 900000) reject(new Error('รูปใหญ่เกินไป ลองใช้รูปที่เล็กลง'));
        else resolve(dataUrl);
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

// ---------- TikTok Login Kit (OAuth 2.0) ----------
// client_key/redirect/scope เป็นค่า public (มาจาก .env -> env-config.local.js)
// ส่วน client_secret + การแลก token อยู่ฝั่ง server (scripts/db-server.mjs)
function imsTikTokCfg_() {
  const e = (window.IMS_ENV) || {};
  return {
    clientKey: e.TIKTOK_CLIENT_KEY || '',
    redirectUri: e.TIKTOK_REDIRECT_URI || (location.origin + location.pathname),
    scopes: e.TIKTOK_SCOPES || 'user.info.basic,user.info.profile,user.info.stats,video.list',
  };
}
function imsTikTokAvailable_() {
  // รองรับเฉพาะ backend ที่มี server แลก token (mysql/db-server)
  return imsApiMode_();
}
// TikTok PKCE: code_challenge = hex(SHA256(code_verifier)) — TikTok ใช้ hex (ไม่ใช่ base64url)
async function imsSha256Hex_(str) {
  const data = new TextEncoder().encode(str);
  const buf = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(buf)).map((b) => b.toString(16).padStart(2, '0')).join('');
}
async function startTikTokLogin() {
  const cfg = imsTikTokCfg_();
  if (!cfg.clientKey) {
    Swal.fire({
      icon: 'info',
      title: 'ยังไม่ได้ตั้งค่า TikTok Login',
      html: 'กำหนด <code>TIKTOK_CLIENT_KEY</code>, <code>TIKTOK_CLIENT_SECRET</code>, <code>TIKTOK_REDIRECT_URI</code> ใน <code>.env</code><br>แล้วรัน <code>npm run config:gen</code> และรีสตาร์ทเซิร์ฟเวอร์',
    });
    return;
  }
  const state = (window.crypto && crypto.randomUUID ? crypto.randomUUID() : String(Math.random()) + Date.now()).replace(/-/g, '');
  // PKCE — สร้าง code_verifier (hex 64 ตัว) + code_challenge
  const vb = new Uint8Array(32);
  crypto.getRandomValues(vb);
  const codeVerifier = Array.from(vb).map((b) => b.toString(16).padStart(2, '0')).join('');
  const codeChallenge = await imsSha256Hex_(codeVerifier);
  try {
    sessionStorage.setItem('tiktok_oauth_state', state);
    sessionStorage.setItem('tiktok_code_verifier', codeVerifier);
  } catch {}
  // 3.1 — Authorization Request: ส่งผู้ใช้ไปล็อกอิน/อนุญาตที่ TikTok (พร้อม PKCE)
  const params = new URLSearchParams({
    client_key: cfg.clientKey,
    scope: cfg.scopes,
    response_type: 'code',
    redirect_uri: cfg.redirectUri,
    state,
    code_challenge: codeChallenge,
    code_challenge_method: 'S256',
  });
  window.location.href = 'https://www.tiktok.com/v2/auth/authorize/?' + params.toString();
}
// เรียกตอน boot: ถ้า url มี ?code=... (TikTok redirect กลับมา) ให้แลก token แล้วล็อกอิน
async function handleTikTokCallbackIfPresent_() {
  const sp = new URLSearchParams(location.search || '');
  const code = sp.get('code');
  const err = sp.get('error');
  if (!code && !err) return false;
  const state = sp.get('state');
  let saved = null;
  let codeVerifier = '';
  try {
    saved = sessionStorage.getItem('tiktok_oauth_state');
    codeVerifier = sessionStorage.getItem('tiktok_code_verifier') || '';
  } catch {}
  const cleanUrl = location.origin + location.pathname;
  if (err) {
    history.replaceState(null, '', cleanUrl);
    Swal.fire({ icon: 'error', title: 'TikTok ปฏิเสธการเข้าสู่ระบบ', text: sp.get('error_description') || err });
    return true;
  }
  // ตรวจ CSRF state
  if (!saved || saved !== state) {
    history.replaceState(null, '', cleanUrl);
    Swal.fire({ icon: 'error', title: 'การยืนยันไม่ถูกต้อง (state)', text: 'กรุณาลองเข้าสู่ระบบด้วย TikTok อีกครั้ง' });
    return true;
  }
  try { sessionStorage.removeItem('tiktok_oauth_state'); sessionStorage.removeItem('tiktok_code_verifier'); } catch {}
  history.replaceState(null, '', cleanUrl);
  if (!imsTikTokAvailable_()) {
    Swal.fire({ icon: 'error', title: 'ไม่รองรับ TikTok Login บน backend นี้', text: 'ต้องใช้ backend แบบ server (IMS_BACKEND=mysql)' });
    return true;
  }
  Swal.fire({ title: 'กำลังเข้าสู่ระบบด้วย TikTok...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
  try {
    const cfg = imsTikTokCfg_();
    const r = await imsApiFetch_('/tiktok/exchange', { method: 'POST', body: { code, redirect_uri: cfg.redirectUri, code_verifier: codeVerifier } });
    if (!r || !r.success) {
      Swal.fire({ icon: 'error', title: 'เข้าสู่ระบบด้วย TikTok ไม่สำเร็จ', text: (r && r.error) || 'แลก token ไม่สำเร็จ' });
      return true;
    }
    imsApiSetToken_(r.token);
    STATE.role = 'creator';
    STATE.currentPage = 'creator-home';
    STATE.currentUser = r.influencer;
    STATE.creatorDepartmentId = (r.influencer && r.influencer.department_id) || null;
    STATE._loginTab = null;
    await imsApiSnapshot_();
    Swal.close();
    render();
  } catch (e) {
    Swal.fire({ icon: 'error', title: 'เกิดข้อผิดพลาด', text: e.message || String(e) });
  }
  return true;
}

function imsFmtCount_(n) {
  n = Number(n || 0);
  if (!isFinite(n)) return '0';
  if (Math.abs(n) >= 1e9) return (n / 1e9).toFixed(n % 1e9 === 0 ? 0 : 1) + 'B';
  if (Math.abs(n) >= 1e6) return (n / 1e6).toFixed(n % 1e6 === 0 ? 0 : 1) + 'M';
  if (Math.abs(n) >= 1e3) return (n / 1e3).toFixed(n % 1e3 === 0 ? 0 : 1) + 'K';
  return String(n);
}
function imsFmtFull_(n) { return Number(n || 0).toLocaleString('en-US'); }
function imsFmtDuration_(s) {
  s = Math.max(0, Math.floor(Number(s || 0)));
  const m = Math.floor(s / 60), r = s % 60;
  return m + ':' + String(r).padStart(2, '0');
}
function imsFmtDate_(unixSec) {
  const t = Number(unixSec || 0);
  if (!t) return '-';
  try { return new Date(t * 1000).toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric' }); } catch { return '-'; }
}

async function loadTikTokDashboard_(force) {
  if (!imsApiMode_()) return;
  const d = STATE._tiktokDash || (STATE._tiktokDash = {});
  if (d.loading) return;
  if (d.loaded && !force) { paintTikTokDash_(); return; }
  d.loading = true; paintTikTokDash_();
  try {
    const [me, vids] = await Promise.all([
      imsApiFetch_('/tiktok/me'),
      imsApiFetch_('/tiktok/videos'),
    ]);
    d.linked = !!((me && me.linked) || (vids && vids.linked));
    d.user = (me && me.user) || null;

    d.error = (me && me.error) || (vids && vids.error) || null;
